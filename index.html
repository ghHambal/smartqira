// ============================================
// ⚡ อัปเดตรายการยุซ/IQRA'
// ============================================
function updateJuzList() {
  const juzSelect = document.getElementById('logJuz');
  if (!juzSelect) return;

  const selectedTypeObj = document.querySelector('input[name="logType"]:checked');
  const selectedType = selectedTypeObj ? selectedTypeObj.value : '';
  const isReviewMode = (selectedType === 'سبقي' || selectedType === 'منزل');
  const isQiraati = (selectedType === 'قراءتي'); // 👈 เช็คว่าเป็นกีรออาตีไหม

  let passedJuzs = new Set();
  currentStudentPassedLogs.forEach(log => {
    if (log.juzNumber && Number(log.juzNumber) > 0) {
      passedJuzs.add(Number(log.juzNumber));
    } else if (log.surahNumber && mappingData) {
      const mapping = mappingData.find(m => Number(m.surahNumber || m.number) === Number(log.surahNumber));
      if (mapping && (mapping.juzNumber || mapping.juz)) {
        passedJuzs.add(Number(mapping.juzNumber || mapping.juz));
      }
    }
  });

  const passedJuzsArray = Array.from(passedJuzs).sort((a, b) => a - b);

  if (isReviewMode) {
    console.log(`🔄 โหมดทบทวน (${selectedType})`);
    console.log(`✅ ยุซที่นักเรียนเคยผ่าน:`, passedJuzsArray.length > 0 ? passedJuzsArray : 'ไม่มีประวัติ');
  }

  const currentVal = juzSelect.value;
  
  // ⚡ วาด <option> ใหม่ตามประเภทการท่อง
  if (isQiraati) {
    juzSelect.innerHTML = `<option value="">เลือกเล่ม</option>`;
    // สร้างตัวเลือก IQRA' 1 ถึง IQRA' 6
    for (let i = 1; i <= 6; i++) {
      juzSelect.innerHTML += `<option value="${i}">IQRA' ${i}</option>`;
    }
  } else {
    juzSelect.innerHTML = `<option value="">เลือกยุซ</option>`;
    let availableJuzs = Array.from({length: 30}, (_, i) => i + 1);

    if (isReviewMode) {
      availableJuzs = availableJuzs.filter(j => passedJuzs.has(j));
    }

    availableJuzs.forEach(j => {
      juzSelect.innerHTML += `<option value="${j}">ยุซ ${j}</option>`;
    });
  }

  // คืนค่าที่เลือกไว้ (เช็คก่อนว่าค่าที่เคยเลือก ยังมีให้เลือกอยู่ไหม)
  if (currentVal && Array.from(juzSelect.options).some(opt => opt.value === currentVal)) {
    juzSelect.value = currentVal;
  } else {
    juzSelect.value = '';
  }
}

// ============================================
// ⚡ อัปเดตรายการซูเราะห์
// ============================================
function updateSurahList() {
  const selectedTypeObj = document.querySelector('input[name="logType"]:checked');
  const selectedType = selectedTypeObj ? selectedTypeObj.value : '';
  
  // ⛔️ ถ้านี่คือโหมดกีรออาตี ให้ซ่อน Info Box แล้วหยุดการทำงานเลย เพื่อไม่ให้มันลบตัวเลข 1-50 ที่เราสร้างไว้
  if (selectedType === 'قراءتي') {
      hideSurahInfoBox();
      return; 
  }

  const juzSelectValue = document.getElementById('logJuz').value;
  const juz = parseInt(juzSelectValue);
  const surahSelect = document.getElementById('logSurah');
  const isReviewMode = (selectedType === 'سبقي' || selectedType === 'منزل');
  
  surahSelect.innerHTML = '<option value="">เลือกซูเราะห์</option>';
  resetAyahDropdowns();
  hideSurahInfoBox();
  
  if (!juz || !mappingData || mappingData.length === 0) return;
  
  let surahsInJuz = mappingData.filter(m => parseInt(m.juzNumber || m.juz) === juz);
  
  if (isReviewMode) {
      const passedSurahNumbers = new Set(currentStudentPassedLogs.map(l => Number(l.surahNumber)));
      surahsInJuz = surahsInJuz.filter(m => passedSurahNumbers.has(Number(m.surahNumber || m.number)));
      
      if (surahsInJuz.length === 0) {
          showToast('นักเรียนยังไม่เคยท่องจำซูเราะห์ใดในยุซนี้', 'warning');
          return;
      }
  }
  
  surahsInJuz.forEach(m => {
    const option = document.createElement('option');
    const sNum = m.surahNumber || m.number;
    const sNameThai = m.surahNameThai || m.name || '';
    const sNameArabic = m.surahNameArabic || m.arabic || '';
    const sAyahRange = m.ayahRange || '';

    option.value = sNum;
    option.dataset.name = sNameThai;
    option.dataset.arabic = sNameArabic;
    option.textContent = `${sNum}. ${sNameThai} (${sNameArabic}) - อายะฮ์ ${sAyahRange}`;
    surahSelect.appendChild(option);
  });
  
  surahSelect.onchange = function() { onSurahSelected(juz); };
}


// ============================================
// ⚡ จัดการการแสดงผล UI แบบ Dynamic ตามประเภท
// ============================================
function togglePagesField(logType) {
  console.log(`🔘 เปลี่ยนประเภทการท่องเป็น:`, logType);
  
  // 🪄 ส่วนที่ 1: จัดการการแปลงร่างของฟอร์ม (กีรออาตี)
  const labelJuz = document.getElementById('labelJuz');
  const containerJuz = document.getElementById('containerJuz');
  const containerSurah = document.getElementById('containerSurah');
  const labelAyah = document.getElementById('labelAyah');
  const ayahStart = document.getElementById('logAyahStart');
  const ayahEnd = document.getElementById('logAyahEnd');

  if (logType === 'قراءتي') {
    // 1. เปลี่ยนยุซ -> บทที่
    if (labelJuz) labelJuz.innerHTML = 'บทที่';
    
    // 2. ซ่อนซูเราะห์ และขยายช่องบทที่ให้เต็มพื้นที่
    if (containerSurah) containerSurah.classList.add('hidden');
    if (containerJuz) { 
        containerJuz.classList.remove('col-span-1'); 
        containerJuz.classList.add('col-span-2'); 
    }
    
    // 3. เปลี่ยน อายะฮ์ -> หน้าที่อ่าน
    if (labelAyah) labelAyah.innerHTML = 'หน้าที่อ่าน <span class="text-xs text-gray-500">(เลือกจาก 1 - 50)</span>';
    
    // 4. ใส่ตัวเลข 1-50 ให้เลือกอัตโนมัติ
    if (ayahStart && ayahEnd) {
      let options = '<option value="">-</option>';
      for(let i=1; i<=50; i++) options += `<option value="${i}">${i}</option>`;
      ayahStart.innerHTML = options;
      ayahEnd.innerHTML = options;
    }
  } else {
    // 🔙 คืนค่าเดิมถ้าไม่ใช่กีรออาตี
    if (labelJuz) labelJuz.innerHTML = 'ยุซ';
    if (containerSurah) containerSurah.classList.remove('hidden');
    if (containerJuz) { 
        containerJuz.classList.remove('col-span-2'); 
        containerJuz.classList.add('col-span-1'); 
    }
    if (labelAyah) labelAyah.innerHTML = 'อายะฮ์ที่ท่อง <span class="text-xs text-gray-500">(เลือกจาก - ถึง)</span>';
  }

  // 🪄 ส่วนที่ 2: อัปเดต Dropdown
  updateJuzList();
  updateSurahList();
  
  // 🪄 ส่วนที่ 3: จัดการช่องกรอกจำนวนแผ่น
  const pagesSection = document.getElementById('pagesSection');
  if (!pagesSection) return;
  
  const typesWithPages = (appSettings.logTypesWithPages || 'سبق,سبقي').split(',').map(t => t.trim());
    
  if (typesWithPages.includes(logType)) {
    pagesSection.classList.remove('hidden');
    document.getElementById('pagesDisplayMode').classList.remove('hidden');
    document.getElementById('pagesEditMode').classList.add('hidden');
    calculateAyahPages(); 
  } else {
    pagesSection.classList.add('hidden');
    const input = document.getElementById('logPages');
    if (input) input.value = '';
  }
}

// ============================================
// ⚡ อัปเดตข้อมูลอายะฮ์และหน้า (ดึงจาก mappingData)
// ============================================
function onSurahSelected(juz) {
  const surahSelect = document.getElementById('logSurah');
  const surahNumber = parseInt(surahSelect.value);
  
  resetAyahDropdowns();
  hideSurahInfoBox();
  
  // ⚡ ใช้ mappingData แทน
  if (!surahNumber || !mappingData) return;
  
  // หาข้อมูล Mapping
  const info = mappingData.find(m => parseInt(m.surahNumber || m.number) === surahNumber && parseInt(m.juzNumber || m.juz) === juz);
  
  if (!info) return;

  // 1. ระบบหั่นข้อความอายะฮ์ (เช่น "1-7" -> 1 ถึง 7)
  const aRange = info.ayahRange || '';
  let aStart = 1, aEnd = 1;
  if (aRange.includes('-')) {
      const parts = aRange.split('-');
      aStart = parseInt(parts[0]);
      aEnd = parseInt(parts[1]);
  } else {
      aStart = parseInt(aRange) || parseInt(info.ayahStart) || 1;
      aEnd = parseInt(aRange) || parseInt(info.ayahEnd) || parseInt(info.ayahCount) || 1;
  }
  const aCount = (aEnd - aStart) + 1;

  // 2. ระบบหั่นข้อความหน้ากระดาษ (ถ้ามี เช่น "1-2" -> 1 ถึง 2)
  const pRange = info.pageRange || '';
  let pStart = 1, pEnd = 1;
  if (pRange.includes('-')) {
      const pParts = pRange.split('-');
      pStart = parseInt(pParts[0]);
      pEnd = parseInt(pParts[1]);
  } else {
      pStart = parseInt(pRange) || parseInt(info.pageStart) || 1;
      pEnd = parseInt(pRange) || parseInt(info.pageEnd) || 1;
  }
  const pCount = (pEnd - pStart) + 1;

  // แสดง Info Box
  document.getElementById('surahInfoTitle').textContent = `${info.surahNameThai || info.name} (${info.surahNameArabic || info.arabic}) • ญุซ ${info.juzNumber || info.juz}`;
  document.getElementById('surahInfoAyahRange').textContent = aRange || `${aStart}-${aEnd}`;
  document.getElementById('surahInfoAyahCount').textContent = aCount;
  document.getElementById('surahInfoPageRange').textContent = pRange || `${pStart}-${pEnd}`;
  document.getElementById('surahInfoPageCount').textContent = pCount;
  document.getElementById('surahInfoBox').classList.remove('hidden');
  
  // ใส่ตัวเลือกอายะฮ์ใน Dropdown
  const startSelect = document.getElementById('logAyahStart');
  const endSelect = document.getElementById('logAyahEnd');
  startSelect.innerHTML = '<option value="">-</option>';
  endSelect.innerHTML = '<option value="">-</option>';
  
  // สร้าง Dropdown จากค่า aStart ถึง aEnd
  for (let i = aStart; i <= aEnd; i++) {
    startSelect.innerHTML += `<option value="${i}">${i}</option>`;
    endSelect.innerHTML += `<option value="${i}">${i}</option>`;
  }
  
  // เก็บข้อมูลไว้ใช้คำนวณจำนวนหน้าอัตโนมัติ
  startSelect.dataset.ayahStart = aStart;
  startSelect.dataset.ayahEnd = aEnd;
  startSelect.dataset.pageStart = pStart;
  startSelect.dataset.pageEnd = pEnd;
}

let mappingData = null;

// 🆕 คำนวณจำนวนหน้า (Proportional Calculation)
function calculateAyahPages() {
  const startSelect = document.getElementById('logAyahStart');
  const endSelect = document.getElementById('logAyahEnd');
  const calcInfo = document.getElementById('ayahCalcInfo');
  
  const start = parseInt(startSelect.value);
  const end = parseInt(endSelect.value);
  
  if (!start || !end) {
    calcInfo.classList.add('hidden');
    updatePagesDisplay(0); // Reset display
    return;
  }
  
  // ตรวจสอบว่า end >= start
  if (end < start) {
    showToast('อายะฮ์สิ้นสุดต้องมากกว่าหรือเท่ากับอายะฮ์เริ่มต้น', 'warning');
    return;
  }
  
  // คำนวณ
  const ayahStart = parseInt(startSelect.dataset.ayahStart) || 1;
  const ayahEnd = parseInt(startSelect.dataset.ayahEnd) || end;
  const pageStart = parseInt(startSelect.dataset.pageStart) || 1;
  const pageEnd = parseInt(startSelect.dataset.pageEnd) || 1;
  
  const totalAyahsInSurah = ayahEnd - ayahStart + 1;
  const totalPagesInSurah = pageEnd - pageStart + 1;
  const ayahsRead = end - start + 1;
  
  // คำนวณแบบสัดส่วน
  const pagesProportional = (ayahsRead / totalAyahsInSurah) * totalPagesInSurah;
  const pagesFormatted = parseFloat(pagesProportional.toFixed(1));
  
  document.getElementById('ayahCountCalc').textContent = ayahsRead;
  document.getElementById('pagesCalc').textContent = pagesFormatted;
  calcInfo.classList.remove('hidden');
  
  // 🎯 Auto-fill pages (ถ้ายังอยู่ใน Display Mode)
  const pagesSection = document.getElementById('pagesSection');
  if (pagesSection && !pagesSection.classList.contains('hidden')) {
    const displayMode = document.getElementById('pagesDisplayMode');
    const isDisplayMode = displayMode && !displayMode.classList.contains('hidden');
    
    if (isDisplayMode) {
      // อยู่ในโหมด Auto → อัปเดต Display
      updatePagesDisplay(pagesFormatted);
      // Set ค่า logPages ด้วย (hidden input)
      const logPagesInput = document.getElementById('logPages');
      if (logPagesInput) {
        logPagesInput.value = pagesFormatted;
      }
    }
    // ถ้าอยู่ใน Manual Mode → ไม่ยุ่ง ให้ครูกรอกเอง
  }
}

// 🆕 อัปเดต Display Mode
function updatePagesDisplay(pages) {
  const display = document.getElementById('pagesDisplay');
  const input = document.getElementById('logPages');
  
  if (typeof pages === 'undefined') {
    // เรียกจาก manual input (update display ตาม input)
    if (input) pages = parseFloat(input.value) || 0;
    else pages = 0;
  }
  
  if (display) display.textContent = pages;
  if (input) input.value = pages;
}

// 🆕 เปิดโหมดแก้ไขด้วยตนเอง
function enableManualPages() {
  document.getElementById('pagesDisplayMode').classList.add('hidden');
  document.getElementById('pagesEditMode').classList.remove('hidden');
  
  // Copy ค่าปัจจุบันไปที่ input
  const currentValue = document.getElementById('pagesDisplay').textContent;
  const input = document.getElementById('logPages');
  if (input) {
    input.value = currentValue;
    input.focus();
    input.select();
  }
}

// 🆕 กลับไปใช้ค่า Auto
function resetToAutoPages() {

async function submitLog(e) {
  e.preventDefault(); // หยุดการรีเฟรชหน้า
  
  // 1. เช็คข้อมูลเบื้องต้น (Manual Validation แทน Browser)
  const logDate = document.getElementById('logDate').value;
  if (!logDate) {
    showToast('กรุณาเลือกวันที่', 'warning');
    return;
  }

  const logType = document.querySelector('input[name="logType"]:checked');
  if (!logType) {
    showToast('กรุณาเลือกประเภทการท่อง', 'warning');
    return;
  }
  
  const surahSelect = document.getElementById('logSurah');
  const surahNumber = parseInt(surahSelect.value) || 0;
  const surahName = surahNumber ? surahSelect.options[surahSelect.selectedIndex].dataset.name : '';
  const juzNumber = parseInt(document.getElementById('logJuz').value) || 0;

  // รวบรวมช่วงอายะฮ์
  const startAyah = document.getElementById('logAyahStart') ? document.getElementById('logAyahStart').value : '';
  const endAyah = document.getElementById('logAyahEnd') ? document.getElementById('logAyahEnd').value : '';
  let currentAyah = '';
  if (startAyah && endAyah) {
    currentAyah = startAyah === endAyah ? startAyah : startAyah + '-' + endAyah;
  }

  // 🚨 2. ตรวจสอบการท่องซ้ำ (เฉพาะโหมดท่องจำใหม่ - سبق)
  if (logType.value === 'سبق' && surahNumber > 0 && currentAyah) {
    // ลองค้นหาดูว่าในประวัติที่ผ่านแล้ว มีซูเราะห์และอายะฮ์ช่วงนี้เป๊ะๆ ไหม
    const isDuplicate = currentStudentPassedLogs.find(log => 
      log.logType === 'سبق' && 
      parseInt(log.surahNumber) === surahNumber && 
      log.ayah === currentAyah
    );

    if (isDuplicate) {
      // ถ้าซ้ำ! ให้โชว์ป๊อปอัปแจ้งเตือนและหยุดการทำงานทันที
      showDuplicateWarningModal(juzNumber, surahName, currentAyah);
      return; 
    }
  }

  // 3. แพ็กข้อมูลเตรียมส่ง
  const scoreEl = document.querySelector('input[name="logScore"]:checked');
  const statusEl = document.querySelector('input[name="logStatus"]:checked');
  const pagesInput = document.getElementById('logPages');
  const pagesValue = pagesInput ? parseFloat(pagesInput.value) || 0 : 0;

  const data = {
    logId: 'LOG-' + Date.now() + '-' + Math.floor(Math.random() * 1000),
    studentId: document.getElementById('logStudentId').value,
    teacherId: currentUser.userId,
    date: logDate,
    logType: logType.value,
    juzNumber: juzNumber,
    surahNumber: surahNumber,
    surahName: surahName,
    ayah: currentAyah,
    score: scoreEl ? parseFloat(scoreEl.value) : 0,
    pages: pagesValue,
    status: statusEl ? statusEl.value : 'RECORDED',
    note: document.getElementById('logNote').value
  };
  
  showLoading('กำลังบันทึกคะแนน...');
  try {
    const { error } = await supabaseClient.from('Logs').insert([data]);
    if (error) throw error;
    
    hideLoading();
    cacheClear('students_all');
    cacheClear(`students_teacher_${currentUser.userId}`);
    cacheClear(`dashboard_${currentUser.userId}_${currentUser.role}`);
    cacheClear(`logs_teacher_${currentUser.userId}`);
    cacheClear('logs_all');
    
    showToast('บันทึกสำเร็จ!', 'success');
    closeModal();
    
    if (currentTab === 'dashboard') renderDashboard();
    else if (currentTab === 'students') renderStudents();
    else if (currentTab === 'logs') renderLogsTab();
    
  } catch (error) {
    hideLoading();
    showToast('เกิดข้อผิดพลาด: ' + error.message, 'error');
    console.error("Submit Log Error:", error);
  }
}

// 1. ฟังก์ชันพรีวิวรูปภาพก่อนกดบันทึก
function previewImageBeforeUpload(input, imgId) {
  const file = input.files[0];
  if (file) {
    if (file.size > 5 * 1024 * 1024) { // ขยายให้รองรับไฟล์ต้นฉบับได้ถึง 5MB
      showToast('ไฟล์ต้นฉบับต้องขนาดไม่เกิน 5MB', 'warning');
      input.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById(imgId).src = e.target.result;
    }
    reader.readAsDataURL(file);
  }
}

// ⚡ ฟังก์ชันผู้ช่วย: บีบอัดรูปภาพด้วย Canvas (แปลงเป็น .webp)
function compressImage(file, maxWidth = 600, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function(event) {
      const img = new Image();
      img.src = event.target.result;
      img.onload = function() {
        // คำนวณสัดส่วนรูปภาพใหม่ (ถ้ากว้างกว่า maxWidth ให้ย่อลงมา)
        let width = img.width;
        let height = img.height;
        if (width > maxWidth) {
          height = Math.round((height * maxWidth) / width);
          width = maxWidth;
        }

        // วาดรูปลงบน Canvas
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        // แปลง Canvas กลับเป็นไฟล์ WebP เพื่อให้ไฟล์เล็กที่สุด
        canvas.toBlob((blob) => {
          if (!blob) {
            reject(new Error('Canvas to Blob failed'));
            return;
          }
          // สร้างไฟล์ใหม่จาก Blob
          const compressedFile = new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".webp", {
            type: 'image/webp',
            lastModified: Date.now()
          });
          
          console.log(`📉 บีบอัดสำเร็จ! ต้นฉบับ: ${(file.size/1024).toFixed(1)} KB -> ย่อเหลือ: ${(compressedFile.size/1024).toFixed(1)} KB`);
          resolve(compressedFile);
        }, 'image/webp', quality);
      };
      img.onerror = (err) => reject(err);
    };
    reader.onerror = (err) => reject(err);
  });
}

// 2. ฟังก์ชันโยนไฟล์ขึ้น Supabase Bucket (ชื่อ 'avatars')
async function uploadFileToSupabase(file, folderName) {
  if (!file) return null;
  
  try {
    // ⚡ 1. จับไฟล์ต้นฉบับมาเข้าเครื่องบีบอัดก่อนเลย
    // ปรับความกว้างสูงสุด 600px, คุณภาพ 70% (เหลือประมาณ 30-50 KB แน่นอน)
    const compressedFile = await compressImage(file, 600, 0.7);

    // สุ่มชื่อไฟล์ใหม่ (ใช้นามสกุล .webp เสมอตามที่เราแปลงมา)
    const fileName = `${folderName}/${Date.now()}_${Math.random().toString(36).substring(2)}.webp`;

    // 2. อัปโหลดไฟล์ที่ "บีบอัดแล้ว" ขึ้น Supabase
    const { data, error } = await supabaseClient.storage
      .from('avatars') 
      .upload(fileName, compressedFile, { cacheControl: '3600', upsert: false });

    if (error) throw error;

    // 3. ขอ URL แบบ Public เพื่อเอามาบันทึกลงตาราง
    const { data: publicUrlData } = supabaseClient.storage
      .from('avatars')
      .getPublicUrl(fileName);

    return publicUrlData.publicUrl;
  } catch (error) {
    console.error('Storage Upload Error:', error);
    throw new Error('อัปโหลดและบีบอัดรูปภาพไม่สำเร็จ');
  }
}

// 📈 Reports State
// ============================================
let reportsViewMode = localStorage.getItem('hifzReportsView') || 'table';
let reportsSearchQuery = '';
let reportsClassFilter = localStorage.getItem('hifzReportsFilter') || '';
let allReports = []; // เก็บ reports ใน memory สำหรับ filter

function renderReports() {
  const content = document.getElementById('mainContent');

const cacheKey = currentUser.role === 'teacher'
  ? `reports_teacher_${currentUser.userId}`
  : currentUser.role === 'parent'
    ? `reports_parent_${currentUser.userId}`
    : 'reports_all';
  const cachedReports = cacheGet(cacheKey);

  // ⚡ มี cache → แสดงทันที + refresh background
  if (cachedReports) {
    displayReports(cachedReports.reports);
    refreshReportsData(cacheKey, true);
    return;
  }

  // ไม่มี cache → โหลดจาก server
  content.innerHTML = '<div class="text-center py-12"><div class="animate-spin rounded-full h-12 w-12 border-4 border-gray-200 mx-auto" style="border-top-color: var(--primary-color);"></div><p class="mt-4 text-gray-600">กำลังโหลดรายงาน...</p></div>';
  refreshReportsData(cacheKey, false);
}

// ============================================
// 📈 โหลดข้อมูลรายงาน (เวอร์ชัน Supabase)
// ============================================
async function refreshReportsData(cacheKey, silent) {
  let loader = null;
  if (!silent) {
    loader = showProgressLoader({ estimatedSeconds: 10 });
  }

  try {
    // 1. สร้าง Query ดึงนักเรียนตามสิทธิ์การเข้าถึง (Role)
    let stdQuery = supabaseClient.from('Students').select('*').eq('isActive', true);
    
    // ถ้าเป็นครู ดึงเฉพาะห้องตัวเอง / ถ้าเป็นผู้ปกครอง ดึงเฉพาะลูกตัวเอง
    if (currentUser.role === 'teacher') {
        stdQuery = stdQuery.eq('teacherId', currentUser.userId);
    } else if (currentUser.role === 'parent') {
        stdQuery = stdQuery.eq('parentId', currentUser.userId);
    }

    const { data: students, error: err1 } = await stdQuery;
    if (err1) throw err1;

    // ถ้าไม่มีข้อมูลนักเรียน (เช่น ผู้ปกครองเพิ่งลงทะเบียนใหม่)
    if (!students || students.length === 0) {
        cacheSet(cacheKey, { success: true, reports: [] });
        if (loader) loader.finish();
        setTimeout(() => { if (currentTab === 'reports') displayReports([]); }, 500);
        return;
    }

    const studentIds = students.map(s => s.studentId);

    // 2. ดึง Logs, Programs, และ Surahs พร้อมกัน ⚡
    let logQuery = supabaseClient.from('Logs').select('*');
    if (currentUser.role === 'teacher') {
         logQuery = logQuery.eq('teacherId', currentUser.userId);
    } else if (currentUser.role === 'parent') {
         logQuery = logQuery.in('studentId', studentIds);
    }

    const [logRes, progRes, surahRes] = await Promise.all([
        logQuery,
        supabaseClient.from('Programs').select('*').eq('isActive', true),
        supabaseClient.from('Surahs').select('*')
    ]);

    if (logRes.error) throw logRes.error;
    if (progRes.error) throw progRes.error;
    if (surahRes.error) throw surahRes.error;

    const logs = logRes.data || [];
    const programs = progRes.data || [];
    const surahs = surahRes.data || [];

    // จัดกลุ่ม Surahs ตามยุซ (Juz) เพื่อเตรียมคำนวณ "ยุซที่ท่องผ่าน"
    const surahsByJuz = {};
    surahs.forEach(s => {
        if (!surahsByJuz[s.juz]) surahsByJuz[s.juz] = [];
        surahsByJuz[s.juz].push(s);
    });

    // 3. 🧮 ประมวลผลสร้าง "สถิติรายงาน" ทีละคน (Data Crunching)
    const reports = students.map(student => {
        const studentLogs = logs.filter(l => l.studentId === student.studentId);
        const program = programs.find(p => p.programId === student.programId);
        
        const totalLogs = studentLogs.length;
        const passLogs = studentLogs.filter(l => l.status === 'PASS');
        const passCount = passLogs.length;
        const reviewCount = studentLogs.filter(l => l.status === 'NEED_REVIEW').length;
        
        const scoreLogs = studentLogs.filter(l => Number(l.score) > 0);
        const totalScore = scoreLogs.reduce((sum, l) => sum + Number(l.score), 0);
        const avgScore = scoreLogs.length > 0 ? (totalScore / scoreLogs.length).toFixed(1) : 0;

        // คำนวณยุซที่ท่องผ่าน (ต้องท่องผ่านทุกซูเราะห์ในยุซนั้นๆ)
        const passedSurahs = new Set(passLogs.map(l => Number(l.surahNumber)));
        let completedJuz = 0;
        for (let juz = 1; juz <= 30; juz++) {
            const surahsInJuz = surahsByJuz[juz] || [];
            // ถ้ามีซูเราะห์ในยุซนั้น และนักเรียนผ่านทั้งหมด = นับเป็น 1 ยุซที่จบ
            if (surahsInJuz.length > 0 && surahsInJuz.every(s => passedSurahs.has(Number(s.number)))) {
                completedJuz++;
            }
        }

        return {
            studentId: student.studentId,
            firstName: student.firstName,
            lastName: student.lastName,
            classRoom: student.classRoom,
            programId: student.programId,
            targetJuz: program ? Number(program.targetJuzPerTerm) || 0 : 0,
            completedJuz: completedJuz,
            totalLogs: totalLogs,
            passCount: passCount,
            reviewCount: reviewCount,
            avgScore: avgScore
        };
    });

    // อัปเดต Global State ให้หน้า UI ค้นหาข้อมูลเจอ [cite: 618, 620]
    if (currentUser.role !== 'parent') {
       allStudents = students; 
    }
    
    // 4. บันทึก Cache และส่งให้ UI วาดตาราง
    const response = { success: true, reports: reports };
    cacheSet(cacheKey, response);

    if (loader) {
        loader.finish();
        setTimeout(function() {
            if (currentTab === 'reports') displayReports(reports);
        }, 500);
    } else {
        // ⚡ ปลดล็อก: ลบคำว่า !silent ออก
        if (currentTab === 'reports') displayReports(reports);
    }

  } catch (error) {
    if (loader) loader.fail('เกิดข้อผิดพลาด: ' + error.message);
    else if (!silent) showToast('เกิดข้อผิดพลาด: ' + error.message, 'error');
    console.error("Fetch Reports Error:", error);
  }
}

function displayReports(reports) {
  // เก็บไว้ใน memory เพื่อใช้ filter ต่อไป (ไม่ต้อง re-fetch)
  if (reports) allReports = reports;
  renderReportsUI();
}

// ============================================
// 🖨️ เปิด Modal พิมพ์รายงาน (ระบบ Supabase)
// ============================================
async function showReportsPrintModal() {
  if (allStudents && allStudents.length > 0) {
    showBulkPrintModal();
    return;
  }

  const cacheKey = currentUser.role === 'teacher' ? `students_teacher_${currentUser.userId}` : 'students_all';
  
  showLoading('กำลังเตรียมข้อมูลนักเรียน...');
  try {
    let query = supabaseClient.from('Students').select('*').eq('isActive', true);
    if (currentUser.role === 'teacher') {
      query = query.eq('teacherId', currentUser.userId);
    }
    const { data: students, error } = await query;
    if (error) throw error;
    
    allStudents = students || [];
    cacheSet(cacheKey, { success: true, students: allStudents });
    hideLoading();
    showBulkPrintModal();
  } catch (error) {
    hideLoading();
    showToast('เกิดข้อผิดพลาดในการโหลดข้อมูลนักเรียน: ' + error.message, 'error');
  }
}

// ============================================
// 🖨️ พิมพ์รายงานรายบุคคล (ระบบ Supabase)
// ============================================
async function generateReport(studentId, type) {
  closeModal();
  showLoading('กำลังเตรียมรายงาน...');
  
  try {
    const reportData = await fetchReportFromSupabase(studentId);
    const teacher = allTeachers.find(t => t.teacherId === reportData.student.teacherId) || null;
    reportData.teacher = teacher;

    hideLoading();
    
    const printWindow = window.open('', '_blank');
    if (!printWindow) {
      showToast('กรุณาอนุญาต Popup ในเบราว์เซอร์', 'warning');
      return;
    }
    
    const html = buildReportHTML(reportData, type);
    printWindow.document.write(html);
    printWindow.document.close();
    
  } catch (error) {
    hideLoading();
    showToast('เกิดข้อผิดพลาด: ' + error.message, 'error');
  }
}

// ============================================
function buildDailyLogPage(r, schoolName) {
  const s = r.student;
  const logs = r.allLogs || [];

  const formatDateThai = (dateStr) => {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return `${d.getDate()}/${d.getMonth()+1}/${(d.getFullYear()+543).toString().slice(-2)}`;
  };

  let rowsHtml = '';
  const maxRows = 30; // 💡 ปรับเป็น 30 เพื่อให้ตารางดันเต็มหน้า A4 พอดี
  for (let i = 0; i < maxRows; i++) {
    const log = logs[i];
    if (log) {
      rowsHtml += `
        <tr>
          <td class="center-text" style="border: 1px solid #000;">${i + 1}</td>
          <td class="center-text" style="border: 1px solid #000;">${formatDateThai(log.date)}</td>

// ============================================
// 📊 Summary Page (บังคับขึ้นหน้าใหม่เสมอ + ดึงเดือนจากตั้งค่า)
// ============================================
function buildSummaryPage(r, schoolName, currentTerm) {
  const teacher = r.teacher;
  const monthly = r.monthlyStats || {};
  const currentYear = currentTerm.split('/')[1] || '2569';

  // 📥 ดึงข้อมูลเดือนจาก appSettings (ถ้าไม่มีให้ใช้ค่าเริ่มต้น)
  const term1MonthsThai = (appSettings.term1MonthsThai || 'พ.ค., มิ.ย., ก.ค., ส.ค., ก.ย., ต.ค.').split(',').map(s=>s.trim());
  const term1MonthsArabic = (appSettings.term1MonthsArabic || 'فرسفاكوم, ميتونايون, كراكداكوم, سيغهاكوم, كنيابون, تولاكوم').split(',').map(s=>s.trim());
  const term2MonthsThai = (appSettings.term2MonthsThai || 'พ.ย., ธ.ค., ม.ค., ก.พ., มี.ค., เม.ย.').split(',').map(s=>s.trim());
  const term2MonthsArabic = (appSettings.term2MonthsArabic || 'فرسجيكاكون, تنواكوم, مكراكوم, كومفافن, ميناكوم, أبريل').split(',').map(s=>s.trim());

  const gradingCriteria = [
    'เกณฑ์การประเมินให้ระดับผลการ',
    'ท่องจำอัลกุรอานมีดังนี้',
    'เกรด 4 &nbsp; คะแนน 80-100 = 5 แผ่น',
    'เกรด 3.5 คะแนน 75-79 &nbsp;= 4 แผ่น',
    'เกรด 3 &nbsp; คะแนน 70-74 &nbsp;= 3.5 แผ่น',
    'เกรด 2.5 คะแนน 65-69 &nbsp;= 3 แผ่น',
    'เกรด 2 &nbsp; คะแนน 60-64 &nbsp;= 2.5 แผ่น',
    'เกรด 1.5 คะแนน 55-59 &nbsp;= 2 แผ่น',
    'เกรด 1 &nbsp; คะแนน 50-54 &nbsp;= 1 แผ่น'
  ];

  // ⚡ อัปเกรด: ระบบค้นหาเดือนแบบยืดหยุ่น (แก้ปัญหาการเหลื่อมปีปฏิทิน/ปีการศึกษา)
  const getMonthData = (monthNum, year) => {
    const mm = String(monthNum).padStart(2, '0');
    // 1. ลองหาตรงปีเป๊ะๆ ก่อน
    let data = monthly[`${year}-${mm}`];
    if (data) return data;
    
    // 2. ถ้าไม่เจอ ลองหาของปีก่อนหน้า
    data = monthly[`${year - 1}-${mm}`];
    if (data) return data;
    
    // 3. เผื่อหาของปีถัดไป
    data = monthly[`${year + 1}-${mm}`];
    return data || null;
  };

  const buildTermTable = (termNum, thaiMonths, arabicMonths) => {
    const thaiYear = parseInt(currentYear);
    const startMonth = termNum === 1 ? 5 : 11;
    let totalPages = 0;
    let rows = '';

    for (let i = 0; i < 9; i++) {
      const thaiMonth = thaiMonths[i];
      let mData = null;

      if (thaiMonth) {
        let monthNum = startMonth + i;
        let monthYear = thaiYear - 543;
        if (monthNum > 12) { monthNum -= 12; monthYear += 1; }
        mData = getMonthData(monthNum, monthYear);
        if (mData) totalPages += mData.totalPages;
      }

      const checks = [4, 3.5, 3, 2.5, 2, 1.5, 1].map(g => 
        `<td class="center-text" style="border: 1px solid #000;">${(mData && mData.gradeCount[g] > 0) ? '/' : ''}</td>`
      ).join('');

      const noteText = gradingCriteria[i] || '';
      
      rows += `
        <tr>
          <td class="center-text" style="border: 1px solid #000; height: 19px;">${thaiMonth ? (i + 1) : ''}</td>
          <td style="border: 1px solid #000; padding-left: 5px; text-align: left;">${thaiMonth ? `${thaiMonth} / <span class="arabic">${arabicMonths[i]}</span>` : ''}</td>
          <td class="center-text" style="border: 1px solid #000;">${mData && mData.totalPages > 0 ? mData.totalPages.toFixed(1) : (mData ? '0.0' : '')}</td>
          ${checks}
          <td style="border: 1px solid #000; text-align: left; padding-left: 8px; font-size: 11px;">${noteText}</td>
        </tr>
      `;
    }

    // 🧮 ประเมินผลรวมทั้งเทอม เพื่อใส่ด้านล่างสุดของตาราง
    let finalGrade = '-';
    if (totalPages >= 5) finalGrade = '4';
    else if (totalPages >= 4) finalGrade = '3.5';
    else if (totalPages >= 3.5) finalGrade = '3';
    else if (totalPages >= 3) finalGrade = '2.5';
    else if (totalPages >= 2.5) finalGrade = '2';
    else if (totalPages >= 2) finalGrade = '1.5';
    else if (totalPages >= 1) finalGrade = '1';

    return `
      <div style="margin-bottom: 10px;">
        <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; margin-bottom: 3px;">
          <span>ผลการประเมินการท่องจำอัลกุรอาน ภาคเรียนที่ ${termNum} ปีการศึกษา ${currentYear}</span>
          <span class="arabic" style="font-weight: normal; font-size: 16px;">حاصيل فنيلاين حفظ القرآن فغكل ${termNum} تاهون</span>
        </div>
        <table style="width: 100%; border-collapse: collapse; font-size: 12px;">
          <thead>
            <tr>
              <th rowspan="2" style="border: 1px solid #000; width: 4%; text-align: center;">ที่<br><span class="arabic" style="font-weight:normal; font-size:10px;">بيلاغن</span></th>
              <th rowspan="2" style="border: 1px solid #000; width: 14%; text-align: center;">เดือน<br><span class="arabic" style="font-weight:normal; font-size:10px;">بولن</span></th>
              <th rowspan="2" style="border: 1px solid #000; width: 10%; text-align: center;">จำนวนแผ่น<br><span class="arabic" style="font-weight:normal; font-size:10px;">جمله لمبر</span></th>
              <th colspan="7" style="border: 1px solid #000; width: 35%; text-align: center;">ระดับผลการประเมิน<br><span class="arabic" style="font-weight:normal; font-size:10px;">فريكسا فنيلاين</span></th>
              <th rowspan="2" style="border: 1px solid #000; width: 37%; text-align: center;">หมายเหตุ<br><span class="arabic" style="font-weight:normal; font-size:10px;">ملاحظة</span></th>
            </tr>
            <tr>
              <th style="border: 1px solid #000; text-align: center;">4</th><th style="border: 1px solid #000; text-align: center;">3.5</th><th style="border: 1px solid #000; text-align: center;">3</th><th style="border: 1px solid #000; text-align: center;">2.5</th><th style="border: 1px solid #000; text-align: center;">2</th><th style="border: 1px solid #000; text-align: center;">1.5</th><th style="border: 1px solid #000; text-align: center;">1</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        
        <div style="font-size: 12px; line-height: 1.5; margin-top: 5px;">
          <div style="display: flex;"><div style="width: 150px;">จำนวนยุซที่ได้ <span style="display:inline-block; border-bottom:1px dotted #000; width:30px; text-align:center; font-weight:bold;">${r.completedJuz}</span></div><div class="arabic">جمله جزء يغدافت</div></div>
          <div style="display: flex;"><div style="width: 150px;">จำนวนแผ่นที่ได้ <span style="display:inline-block; border-bottom:1px dotted #000; width:30px; text-align:center; font-weight:bold;">${totalPages.toFixed(1)}</span></div><div class="arabic">جمله لمبر يغدافت</div></div>
          <div style="display: flex; border-bottom: 1px solid #000; padding-bottom: 5px;"><div style="width: 150px;">ผลการประเมิน <span style="display:inline-block; border-bottom:1px dotted #000; width:30px; text-align:center; font-weight:bold;">${finalGrade}</span></div><div class="arabic">حاصيل فنيلاين</div></div>
        </div>
      </div>
    `;
  };

  return `
<div class="page page-summary" style="padding: 10px;">
  ${buildTermTable(1, term1MonthsThai, term1MonthsArabic)}
  ${buildTermTable(2, term2MonthsThai, term2MonthsArabic)}

  <div style="margin-top: 20px; display: flex; justify-content: space-around; font-size: 13px; text-align: center;">
    <div>
      <div style="margin-top: 30px;">ลงชื่อ ................................................</div>
      <div style="margin-top: 5px;">(${teacher ? teacher.firstName + ' ' + teacher.lastName : '................................................'})</div>
      <div style="margin-top: 2px;">ครูที่ปรึกษา</div>
    </div>
    <div>
      <div style="margin-top: 30px;">ลงชื่อ ................................................</div>
      <div style="margin-top: 5px;">(................................................)</div>
      <div style="margin-top: 2px;">ผู้อำนวยการ</div>
    </div>
  </div>
</div>
  `;
}

// ============================================
// 📝 Notes Page (บันทึกเพิ่มเติม - ร่องรอยคอมเมนต์ครู)
// ============================================
function buildNotesPage(r, schoolName) {
  const s = r.student;
  const logs = r.allLogs || [];

  // กรองเฉพาะ log ที่มี note (ความคิดเห็นครู)
  const notesLogs = logs.filter(l => l.note && String(l.note).trim() !== '');

  const formatDateThai = (dateStr) => {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return `${d.getDate()}/${d.getMonth()+1}/${(d.getFullYear()+543).toString().slice(-2)}`;
  };

  const totalLines = 32; // 💡 ปรับเส้นสมุดโน้ตเป็น 32 บรรทัด
  let linesHtml = '';
  let linesUsed = 0;

  notesLogs.forEach((log, idx) => {
    if (linesUsed >= totalLines) return;

    const dateText = formatDateThai(log.date);
    const typeText = log.logType || '';
    const surahText = log.surahName ? ` • ${log.surahName}` : '';

    linesHtml += `
      <div class="notebook-line" style="font-weight: 600; color: #000;">
        <span style="color: #666; font-size: 11px; margin-right: 8px;">${idx + 1}.</span>
        ${dateText} — ${typeText}${surahText}
      </div>
    `;
    linesUsed++;

    if (linesUsed < totalLines) {
      linesHtml += `
        <div class="notebook-line" style="padding-left: 24px;">
          ${escapeHtml(String(log.note))}
        </div>
      `;
      linesUsed++;
    }

    if (linesUsed < totalLines) {
      linesHtml += `<div class="notebook-line"></div>`;
      linesUsed++;
    }
  });

  while (linesUsed < totalLines) {
    linesHtml += `<div class="notebook-line"></div>`;
    linesUsed++;
  }

  return `
<div class="page">
  <div style="text-align: center; margin-bottom: 20px; padding-bottom: 8px; border-bottom: 2px solid #000;">
    <h2 style="font-size: 24px; font-weight: bold; margin: 0;">บันทึกเพิ่มเติม</h2>
    <p style="font-size: 12px; color: #666; margin-top: 4px;">
      ชื่อ: <strong>${s.firstName} ${s.lastName}</strong> &nbsp;|&nbsp;
      ชั้น: <strong>${s.classRoom}</strong> &nbsp;|&nbsp;
      รหัส: <strong>${s.studentId}</strong>
    </p>
  </div>

  <div class="notebook-paper">
    ${linesHtml}
  </div>

  <div style="margin-top: 8px; font-size: 10px; color: #555; text-align: right;">
    พิมพ์เมื่อ: ${new Date().toLocaleDateString('th-TH')}
  </div>
</div>
  `;
}

// Helper: escape HTML เพื่อกัน XSS ในข้อความ note
function escapeHtml(text) {
  if (!text) return '';
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function updateBulkPreview() {
  const classSelect = document.getElementById('bulkClassSelect').value;
  const typeEl = document.querySelector('input[name="bulkReportType"]:checked');
  const preview = document.getElementById('bulkPreview');
  const warning = document.getElementById('bulkWarning');
  
  if (!classSelect || !typeEl) {
    preview.classList.add('hidden');
    return;
  }
  
  let studentCount = 0;
  if (classSelect === '__ALL__') {
    studentCount = allStudents.length;
  } else {
    studentCount = allStudents.filter(s => s.classRoom === classSelect).length;
  }
  
  const pagesPerStudent = typeEl.value === 'full' ? 3 : 1;
  const totalPages = studentCount * pagesPerStudent;
  
  document.getElementById('previewCount').textContent = studentCount;
  document.getElementById('previewPages').textContent = totalPages;
  preview.classList.remove('hidden');
  
  // แสดง warning ถ้ามากกว่า 20 คน
  if (studentCount > 20) {
    warning.classList.remove('hidden');
  } else {
    warning.classList.add('hidden');
  }
}

function executeBulkPrint() {
  const classSelect = document.getElementById('bulkClassSelect').value;
  const typeEl = document.querySelector('input[name="bulkReportType"]:checked');
  
  if (!classSelect || !typeEl) {
    showToast('กรุณาเลือกตัวเลือกให้ครบถ้วน', 'warning');
    return;
  }
  
  let targetStudents = [];
  if (classSelect === '__ALL__') {
    targetStudents = allStudents;
  } else {
    targetStudents = allStudents.filter(s => s.classRoom === classSelect);
  }
  
  if (targetStudents.length === 0) {
    showToast('ไม่มีนักเรียนในห้องนี้', 'warning');
    return;
  }
  
  closeModal();
  bulkGenerateReportsNative(targetStudents, typeEl.value); 
}

let allLogs = [];                    // เก็บ logs ดิบใน memory
let logsSearchQuery = '';
let logsClassFilter = localStorage.getItem('hifzLogsClassFilter') || '';
let logsTeacherFilter = localStorage.getItem('hifzLogsTeacherFilter') || '';
let logsDateFilter = localStorage.getItem('hifzLogsDateFilter') || 'all'; // all | today | 7days | 30days | thismonth

// ============================================

function renderLogsTab() {
  const content = document.getElementById('mainContent');
  
  // ⚡ แก้ไข: แยก Cache Key ของผู้ปกครองออกจากส่วนกลางให้ชัดเจน
  let cacheKey = 'logs_all';
  let stdCacheKey = 'students_all';

  if (currentUser.role === 'teacher') {
    cacheKey = `logs_teacher_${currentUser.userId}`;
    stdCacheKey = `students_teacher_${currentUser.userId}`;
  } else if (currentUser.role === 'parent') {
    cacheKey = `logs_parent_${currentUser.userId}`;
    stdCacheKey = `students_parent_${currentUser.userId}`;
  }

  const cachedLogs = cacheGet(cacheKey);
  const cachedStudents = cacheGet(stdCacheKey);

  // ⚡ มี cache ครบ → แสดงทันที + refresh background
  if (cachedLogs && cachedStudents) {
    allStudents = cachedStudents.students;
    displayLogs(cachedLogs.logs);
    refreshLogsData(cacheKey, true); // silent refresh
    return;
  }

  const loader = showProgressLoader({ estimatedSeconds: 10 });
  refreshLogsData(cacheKey, false, loader);
}

// ============================================
// 📝 โหลดข้อมูลบันทึกการท่อง (เวอร์ชัน Supabase)
// ============================================
async function refreshLogsData(cacheKey, silent, loader) {
  try {
    // 1. ดึงนักเรียนตาม Role
    let stdQuery = supabaseClient.from('Students').select('*').eq('isActive', true);
    if (currentUser.role === 'teacher') stdQuery = stdQuery.eq('teacherId', currentUser.userId);
    if (currentUser.role === 'parent') stdQuery = stdQuery.eq('parentId', currentUser.userId);
    
    // วิ่งไปดึงข้อมูลพร้อมกัน ⚡
    const [stdRes, tchRes] = await Promise.all([
      stdQuery,
      supabaseClient.from('Teachers').select('*').eq('isActive', true)
    ]);

    if (stdRes.error) throw stdRes.error;
    if (tchRes.error) throw tchRes.error;

    const students = stdRes.data || [];

    // 2. สร้างเงื่อนไขการดึง Logs
    let logsQuery = supabaseClient
      .from('Logs')
      .select('*')
      .order('date', { ascending: false })
      .limit(500);

    if (currentUser.role === 'teacher') {
      logsQuery = logsQuery.eq('teacherId', currentUser.userId);
    } else if (currentUser.role === 'parent') {
      // 👈 ถ้าเป็นผู้ปกครอง ต้องเอา id ลูกไปกรองดึง Log
      const sIds = students.map(s => s.studentId);
      if (sIds.length > 0) {
         logsQuery = logsQuery.in('studentId', sIds);
      } else {
         logsQuery = logsQuery.eq('studentId', 'NONE');
      }
    }

    const logsRes = await logsQuery;
    if (logsRes.error) throw logsRes.error;

    allLogs = logsRes.data || [];
    allStudents = students;
    allTeachers = tchRes.data || [];

    // 3. อัปเดต Cache ให้ตรงกับ Role
    cacheSet(cacheKey, { success: true, logs: allLogs });

    // (เก็บ Cache นักเรียนและครูเผื่อแท็บอื่นเรียกใช้)
    let stCacheKey = 'students_all';
    if (currentUser.role === 'teacher') stCacheKey = `students_teacher_${currentUser.userId}`;
    else if (currentUser.role === 'parent') stCacheKey = `students_parent_${currentUser.userId}`;

    cacheSet(stCacheKey, { success: true, students: allStudents });
    cacheSet('teachers', { success: true, teachers: allTeachers });

    // 4. ส่งข้อมูลไปวาดลงตาราง
    if (loader) {
      loader.finish();
      setTimeout(function() {
        if (currentTab === 'logs') displayLogs(allLogs);
      }, 500);
    } else {
      // ⚡ ปลดล็อก: สั่งให้วาด UI ใหม่เสมอ แม้จะเป็นการโหลดเบื้องหลัง (Silent)
      if (currentTab === 'logs') displayLogs(allLogs);
    }

  } catch (error) {
    if (loader) loader.fail('เกิดข้อผิดพลาด: ' + error.message);
    else if (!silent) showToast('เกิดข้อผิดพลาด: ' + error.message, 'error');
    console.error("Fetch Logs Error:", error);
  }
}

      const student = allStudents.find(s => s.studentId === log.studentId);
      const teacher = allTeachers.find(t => t.teacherId === log.teacherId);
      const studentName = student ? (student.firstName + ' ' + student.lastName).toLowerCase() : '';

      return studentName.includes(q) ||
        teacherName.includes(q) ||
        String(log.studentId || '').toLowerCase().includes(q) ||
        String(log.surahName || '').toLowerCase().includes(q) ||
        String(log.ayah || '').toLowerCase().includes(q) ||
        String(log.note || '').toLowerCase().includes(q) ||

                      ${log.surahName ? `ยุซ ${log.juzNumber} - ${log.surahName}` : '-'}
                      ${log.ayah ? ` • ${log.ayah}` : ''}
                      ${log.score > 0 ? ` • ⭐ ${log.score}/5` : ''}
                    </p>
                    ${teacher ? `<p class="text-xs text-gray-500 mt-0.5">👩‍🏫 ${teacher.firstName} ${teacher.lastName}</p>` : ''}
                    ${log.note ? `<p class="text-xs text-gray-500 italic mt-1">"${log.note}"</p>` : ''}
                  </div>
                  <div class="text-right text-xs text-gray-500 ml-3 whitespace-nowrap">
                    ${formatDateTime(log.date)}
                  </div>
                </div>
              </div>
            `;
          }).join('')
        }
      </div>
    </div>
  `;

  document.getElementById('mainContent').innerHTML = html;

  // Event listeners
  const searchEl = document.getElementById('logsSearch');
  if (searchEl) {
    searchEl.addEventListener('input', debounce(function() {
      logsSearchQuery = this.value;
      renderLogsUI();
      setTimeout(() => {
        const el = document.getElementById('logsSearch');
        if (el) {
          el.focus();
          el.setSelectionRange(el.value.length, el.value.length);
        }
      }, 0);
    }, 300));
  }

  const classEl = document.getElementById('logsClassFilter');
  if (classEl) {
    classEl.addEventListener('change', function() {
      logsClassFilter = this.value;
      localStorage.setItem('hifzLogsClassFilter', this.value);
      renderLogsUI();
    });
  }

  const teacherEl = document.getElementById('logsTeacherFilter');
  if (teacherEl) {
    teacherEl.addEventListener('change', function() {
      logsTeacherFilter = this.value;
      localStorage.setItem('hifzLogsTeacherFilter', this.value);
      renderLogsUI();
    });
  }

  const dateEl = document.getElementById('logsDateFilter');
  if (dateEl) {
    dateEl.addEventListener('change', function() {
      logsDateFilter = this.value;
      localStorage.setItem('hifzLogsDateFilter', this.value);
      renderLogsUI();
    });
  }
}

function renderNoLogs() {
  const hasActiveFilter = logsSearchQuery || logsClassFilter || logsTeacherFilter || (logsDateFilter && logsDateFilter !== 'all');
  if (hasActiveFilter) {
    return `
      <div class="p-12 text-center">
        <p class="text-4xl mb-3">🔍</p>
        <p class="text-gray-600 font-medium mb-1">ไม่พบบันทึกที่ตรงกับเงื่อนไข</p>
        <p class="text-sm text-gray-500 mb-4">ลองเปลี่ยนคำค้นหาหรือตัวกรอง</p>
        <button onclick="clearLogsFilters()" class="text-blue-600 hover:underline text-sm">
          ล้างตัวกรองทั้งหมด
        </button>
      </div>
    `;
  }
  return '<p class="p-12 text-center text-gray-500">ยังไม่มีบันทึก</p>';
}

function clearLogsFilters() {
  logsSearchQuery = '';
  logsClassFilter = '';
  logsTeacherFilter = '';
  logsDateFilter = 'all';
  localStorage.removeItem('hifzLogsClassFilter');
  localStorage.removeItem('hifzLogsTeacherFilter');
  localStorage.removeItem('hifzLogsDateFilter');
  renderLogsUI();
}

// ============================================
// 🖼️ Image Upload Helpers (System Settings) - Supabase
// ============================================
async function handleImageUpload(inputEl, targetType) {
  const file = inputEl.files[0];
  if (!file) return;

  if (file.size > 5 * 1024 * 1024) {
    showToast('ขนาดไฟล์ต้องไม่เกิน 5MB', 'warning');
    inputEl.value = '';
    return;
  }

  showLoading('กำลังอัปโหลดรูปภาพ...');
  try {
    // โยนไฟล์เข้า Supabase Storage ในโฟลเดอร์ system
    const publicUrl = await uploadFileToSupabase(file, 'system');
    
    hideLoading();
    inputEl.value = ''; // เคลียร์ input file

    // ใส่ URL ลงใน text input + แสดง preview ทันที
    const urlInput = document.getElementById(targetType === 'cover' ? 's_coverImageUrl' : 's_logoUrl');
    if (urlInput) {
      urlInput.value = publicUrl;
      validateAndPreviewImage(urlInput, targetType);
    }
    showToast('✅ อัปโหลดสำเร็จ', 'success');

  } catch (error) {
    hideLoading();
    inputEl.value = '';
    showToast('เกิดข้อผิดพลาด: ' + error.message, 'error');
  }
}

// ตรวจสอบลิงก์รูป + แสดง preview
function validateAndPreviewImage(inputEl, targetType) {
  const url = (inputEl.value || '').trim();
  const previewEl = document.getElementById(
    targetType === 'cover' ? 'coverImagePreview' : 'logoImagePreview'
  );
  const statusEl = document.getElementById(
    targetType === 'cover' ? 'coverImageStatus' : 'logoImageStatus'
  );

  if (!previewEl || !statusEl) return;

  if (!url) {
    previewEl.innerHTML = '';
    statusEl.innerHTML = '<span class="text-gray-400 text-xs">ยังไม่มีรูป</span>';
    return;
  }

  statusEl.innerHTML = '<span class="text-yellow-600 text-xs">⏳ กำลังตรวจสอบลิงก์...</span>';
  previewEl.innerHTML = '';

  const img = new Image();
  const timeoutId = setTimeout(function() {
    img.src = ''; // abort
    statusEl.innerHTML = '<span class="text-red-600 text-xs">❌ โหลดรูปนานเกินไป - อาจใช้งานไม่ได้</span>';
  }, 10000);

  img.onload = function() {
    clearTimeout(timeoutId);
    statusEl.innerHTML = `<span class="text-green-600 text-xs">✓ รูปภาพใช้งานได้ (${img.naturalWidth}×${img.naturalHeight}px)</span>`;
    previewEl.innerHTML = `<img src="${url}" class="max-h-24 object-contain border rounded bg-gray-50 p-2">`;
  };

  img.onerror = function() {
    clearTimeout(timeoutId);
    statusEl.innerHTML = '<span class="text-red-600 text-xs">❌ โหลดรูปภาพไม่ได้ ตรวจสอบลิงก์หรือสิทธิ์การแชร์</span>';
    previewEl.innerHTML = '';
  };

  img.src = url;
}

function switchAdminTab(tab) {
  document.querySelectorAll('.admin-tab').forEach(el => {

    el.style.color = '';

  const active = document.getElementById('admintab-' + tab);
  if (active) {
    active.style.borderBottomColor = 'var(--primary-color)';
    active.style.color = 'var(--primary-color)';
  }
  
  switch(tab) {
    case 'settings': renderAdminSettings(); break;
    case 'programs': renderAdminPrograms(); break;
    case 'teachers': renderAdminTeachers(); break;
    case 'parents': renderAdminParents(); break;
    case 'upload': renderAdminUpload(); break;
    case 'system': renderAdminSystem(); break;

      logTypesWithPages: selectedLogTypes

    try {
      const settingsArray = Object.keys(newSettings).map(k => ({ key: k, value: String(newSettings[k]) }));
      const { error } = await supabaseClient.from('Settings').upsert(settingsArray, { onConflict: 'key' });
      if (error) throw error;

      Object.assign(appSettings, newSettings);
      applyTheme();
      cacheClearAll();
      hideLoading();
      showToast('บันทึกการตั้งค่าสำเร็จ!', 'success');
      setTimeout(() => renderMainApp(), 500);
    } catch (error) {
      hideLoading();
      showToast('เกิดข้อผิดพลาด: ' + error.message, 'error');
      console.error(error);
    }
  });
}

// 🕌 ใช้เทมเพลตฮะดีษ (Fix Error Null)

function applyHadithTemplate(templateNum) {
  const templates = {
    1: { arabic: 'خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ', english: 'Verily the most superior amongst you (Muslims) are those who learn the Quran & teach it.', thai: 'ผู้ประเสริฐที่สุดในหมู่พวกเจ้า คือผู้ที่เรียนรู้อัลกุรอานและสอนมัน' },
    2: { arabic: 'مَنْ قَرَأَ حَرْفًا مِنْ كِتَابِ اللَّهِ فَلَهُ بِهِ حَسَنَةٌ وَالْحَسَنَةُ بِعَشْرِ أَمْثَالِهَا', english: 'Whoever recites a letter from the Book of Allah, he will have a reward. And that reward will be multiplied by ten.', thai: 'ผู้ใดที่อ่านอัลกุรอานเพียงหนึ่งอักษร เขาจะได้ผลบุญหนึ่งประการ และผลบุญนั้นจะถูกคูณด้วยสิบเท่า' },
    3: { arabic: 'اقْرَأْ وَارْتَقِ وَرَتِّلْ كَمَا كُنْتَ تُرَتِّلُ فِي الدُّنْيَا', english: 'Recite and ascend (through the ranks of Paradise) and recite as you used to recite in the world.', thai: 'จงอ่านและยกระดับตนเอง และอ่านให้ไพเราะเหมือนที่เจ้าเคยอ่านในโลกนี้' }
  };
  
  const t = templates[templateNum];
  if (!t) return;
  
  // เช็คก่อนว่ามีกล่อง input อยู่ไหม ค่อยใส่ค่าลงไป (ป้องกัน Error)
  if (document.getElementById('s_hadithArabic')) document.getElementById('s_hadithArabic').value = t.arabic;
  if (document.getElementById('s_hadithEnglish')) document.getElementById('s_hadithEnglish').value = t.english;
  if (document.getElementById('s_hadithThai')) document.getElementById('s_hadithThai').value = t.thai;
  
  showToast('ใช้เทมเพลตสำเร็จ', 'success');
}

function showProgramModal(programId) {
  const program = programId ? allPrograms.find(p => p.programId === programId) : null;
  const isEdit = !!program;
  
  document.getElementById('modalContainer').innerHTML = `
    <div class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4" onclick="if(event.target === this) closeModal()">
      <div class="bg-white rounded-xl shadow-2xl w-full max-w-md">
        <div class="p-5 border-b flex justify-between">
          <h3 class="text-xl font-bold">${isEdit ? '✏️ แก้ไขโปรแกรม' : '➕ เพิ่มโปรแกรม'}</h3>
          <button onclick="closeModal()"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
        <form id="programForm" class="p-5 space-y-4">
          <div>
            <label class="block text-sm font-medium mb-1">รหัสโปรแกรม *</label>
            <input type="text" id="p_id" value="${isEdit ? program.programId : ''}" ${isEdit ? 'disabled' : ''} required
              class="w-full px-4 py-2 border-2 rounded-lg ${isEdit ? 'bg-gray-100' : ''}">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">ชื่อโปรแกรม *</label>
            <input type="text" id="p_name" value="${isEdit ? program.programName : ''}" required
              class="w-full px-4 py-2 border-2 rounded-lg">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">เป้าหมายยุซ/เทอม</label>
            <input type="number" step="0.5" id="p_target" value="${isEdit ? program.targetJuzPerTerm : 0}"
              class="w-full px-4 py-2 border-2 rounded-lg">
            <p class="text-xs text-gray-500 mt-1">ใส่ 0 หากไม่มีเกณฑ์</p>
          </div>
          <div>
            <label class="flex items-center">
              <input type="checkbox" id="p_assess" ${!isEdit || program.hasAssessment ? 'checked' : ''} class="mr-2">
              <span class="text-sm">มีการประเมินคะแนน</span>
            </label>
          </div>
          <div class="flex gap-3">
            <button type="button" onclick="closeModal()" class="flex-1 bg-gray-200 py-2 rounded-lg">ยกเลิก</button>
            <button type="submit" class="flex-1 primary-bg text-white py-2 rounded-lg">${isEdit ? 'บันทึก' : 'เพิ่ม'}</button>
          </div>
        </form>
      </div>
    </div>
  `;
  
document.getElementById('programForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const pId = document.getElementById('p_id').value.trim().toUpperCase();
    const data = {
      programId: pId,
      programName: document.getElementById('p_name').value.trim(),
      targetJuzPerTerm: parseFloat(document.getElementById('p_target').value) || 0,
      hasAssessment: document.getElementById('p_assess').checked,
      isActive: true
    };
    
    showLoading('กำลังบันทึกข้อมูลโปรแกรม...');
    try {
      let res;
      if (isEdit) {
        res = await supabaseClient.from('Programs').update(data).eq('programId', programId);
      } else {
        res = await supabaseClient.from('Programs').insert([data]);
      }
      if (res.error) throw res.error;
      hideLoading();
      cacheClearAll();
      showToast('บันทึกสำเร็จ', 'success');
      closeModal();
      renderAdminPrograms();
    } catch (err) {
      hideLoading();
      showToast(err.message, 'error');
    }
  });
}

async function deleteProgramAction(programId) {
  showLoading('กำลังลบ...');
  try {
    const { error } = await supabaseClient.from('Programs').delete().eq('programId', programId);
    if (error) throw error;
    hideLoading();
    cacheClearAll();
    showToast('ลบโปรแกรมสำเร็จ', 'success');
    renderAdminPrograms();
  } catch (err) {
    hideLoading();
    showToast(err.message, 'error');
  }
}

  const isEdit = !!teacher;
  const nameData = splitPrefixAndName(isEdit ? teacher.firstName : '');
  
  // 1. ดึงรายชื่อห้องทั้งหมดจากฐานข้อมูลนักเรียน (ไม่ซ้ำกัน) มาทำ Dropdown
  const uniqueClasses = [...new Set(allStudents.map(s => s.classRoom).filter(c => c && c !== '-'))].sort();
  
  // (ถ้าครูคนนี้มีห้องที่ปรึกษาอยู่แล้ว แต่ห้องนั้นไม่มีนักเรียนเหลืออยู่เลย ก็ให้เพิ่มห้องเดิมกลับเข้าไปในตัวเลือกด้วย)
  if (isEdit && teacher.classRoom && teacher.classRoom !== '-' && !uniqueClasses.includes(teacher.classRoom)) {
    uniqueClasses.push(teacher.classRoom);
    uniqueClasses.sort();
  }

  // 2. กำหนดรูป Default หากยังไม่มีรูป
  const defaultPhoto = isEdit && teacher.photoUrl ? teacher.photoUrl : 'https://ui-avatars.com/api/?name=' + (nameData.name || 'T') + '&background=e5e7eb&color=374151&size=128';

        <div class="p-5 border-b flex justify-between sticky top-0 bg-white z-10">
          <h3 class="text-xl font-bold">${isEdit ? '✏️ แก้ไขข้อมูลบุคลากร' : '➕ เพิ่มครู/บุคลากร'}</h3>
          <button onclick="closeModal()"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>

        <form id="teacherForm" class="p-5 space-y-3">

                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <input type="file" id="t_photoFile" accept="image/jpeg, image/png, image/webp" class="hidden" onchange="previewImageBeforeUpload(this, 'previewTeacherPhoto')">

            <label class="block text-sm font-bold text-green-800 mb-1">ห้องที่ปรึกษา</label>
            
            <input type="text" id="t_class" value="${isEdit ? teacher.classRoom : ''}" list="teacherClassList" placeholder="คลิกเพื่อเลือก หรือพิมพ์ห้องใหม่" class="w-full px-4 py-2 border-2 rounded-lg focus:border-green-500 bg-white">

              ${uniqueClasses.map(c => `<option value="${c}">`).join('')}
            </datalist>
            
            <p class="text-xs text-green-700 mt-1">✨ เมื่อบันทึก ระบบจะนำรหัสครูคนนี้ ไปผูกให้นักเรียนทุกคนในห้องนี้อัตโนมัติ</p>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium mb-1">เบอร์โทร</label>
              <input type="tel" id="t_phone" value="${isEdit ? teacher.phone : ''}" class="w-full px-4 py-2 border-2 rounded-lg">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Email</label>
              <input type="email" id="t_email" value="${isEdit ? teacher.email : ''}" class="w-full px-4 py-2 border-2 rounded-lg">
            </div>
          </div>
          <div class="flex gap-3 pt-3">
            <button type="button" onclick="closeModal()" class="flex-1 bg-gray-200 py-2 rounded-lg">ยกเลิก</button>
            <button type="submit" class="flex-1 primary-bg text-white py-2 rounded-lg">${isEdit ? 'บันทึก' : 'เพิ่ม'}</button>
          </div>
        </form>
      </div>
    </div>
  `;
  
  document.getElementById('teacherForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const tId = document.getElementById('t_id').value.trim().toUpperCase();
    const tClass = document.getElementById('t_class').value.trim();
    const fileInput = document.getElementById('t_photoFile');
    const roleVal = document.getElementById('t_role').value;

    showLoading('กำลังบันทึกข้อมูลครู...');
    try {
      let finalPhotoUrl = isEdit ? teacher.photoUrl : null;
      
      // 1. อัปโหลดรูปภาพถ้ามีการเลือกใหม่
      if (fileInput.files.length > 0) {
        document.getElementById('loadingText').textContent = 'กำลังอัปโหลดรูปภาพ...';
        finalPhotoUrl = await uploadFileToSupabase(fileInput.files[0], 'teachers');
      }

      const data = {
        teacherId: tId,
        firstName: (document.getElementById('t_prefix').value + ' ' + document.getElementById('t_fname').value.trim()).trim().replace(/\s+/g, ' '),
        lastName: document.getElementById('t_lname').value.trim(),
        classRoom: tClass,
        phone: document.getElementById('t_phone').value.trim(),
        email: document.getElementById('t_email').value.trim(),
        role: roleVal,
        isActive: true
      };
      if (finalPhotoUrl) data.photoUrl = finalPhotoUrl;

      // 2. บันทึกข้อมูลครูลงตาราง Teachers
      document.getElementById('loadingText').textContent = 'กำลังอัปเดตฐานข้อมูล...';
      let res;
      if (isEdit) {
        res = await supabaseClient.from('Teachers').update(data).eq('teacherId', teacherId);
      } else {
        res = await supabaseClient.from('Teachers').insert([data]);
      }
      if (res.error) throw res.error;

      // 3. ระบบผูกนักเรียนอัตโนมัติ (อัปเดตตาราง Students)
      if (tClass && roleVal === 'teacher') {
        document.getElementById('loadingText').textContent = 'กำลังผูกนักเรียนเข้ากับครู...';
        const { error: updateStdErr } = await supabaseClient
          .from('Students')
          .update({ teacherId: tId })
          .eq('classRoom', tClass);
        if (updateStdErr) console.warn("Failed to auto-update students:", updateStdErr);
      }

      hideLoading();
      cacheClearAll();
      showToast('บันทึกสำเร็จ (พร้อมอัปเดตห้องเรียนอัตโนมัติ)', 'success');
      closeModal();
      renderAdminTeachers();
    } catch (err) {
      hideLoading();
      showToast(err.message, 'error');
    }
  });
}

async function toggleTeacherAction(teacherId) {
  const teacher = allTeachers.find(t => t.teacherId === teacherId);
  if (!teacher) return;
  showLoading('กำลังเปลี่ยนสถานะ...');
  try {
    const { error } = await supabaseClient.from('Teachers').update({ isActive: !teacher.isActive }).eq('teacherId', teacherId);
    if (error) throw error;
    hideLoading();
    cacheClearAll();
    showToast('เปลี่ยนสถานะสำเร็จ', 'success');
    renderAdminTeachers();
  } catch (err) {
    hideLoading();
    showToast(err.message, 'error');
  }
}

async function deleteTeacherAction(teacherId) {
  showLoading('กำลังลบ...');
  try {
    const { error } = await supabaseClient.from('Teachers').delete().eq('teacherId', teacherId);
    if (error) throw error;
    hideLoading();
    cacheClearAll();
    showToast('ลบข้อมูลสำเร็จ', 'success');
    renderAdminTeachers();
  } catch (err) {
    hideLoading();
    showToast(err.message, 'error');
  }
}

// 3. ฟังก์ชันรีเซ็ตหน้าจอ
function resetUploadUI() {
  const fileInput = document.getElementById('csvFile');
  const mapSection = document.getElementById('mappingSection');
  if (fileInput) fileInput.value = ''; 
  if (mapSection) mapSection.classList.add('hidden'); 
  rawCSVData = [];
  uploadedHeaders = [];
}

// 4. อ่านไฟล์เมื่อผู้ใช้กดเลือกไฟล์
function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) {
    resetUploadUI();
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    rawCSVData = text.split('\n').filter(l => l.trim() !== '');
    
    if (rawCSVData.length < 2) {
      showToast('ไฟล์ว่างเปล่า', 'error');
      return;
    }

    uploadedHeaders = rawCSVData[0].split(',').map(h => h.trim().replace(/\r/g, '').replace(/^\uFEFF/, '').replace(/"/g, ''));
    generateMappingGrid();
  };
  reader.readAsText(file, 'UTF-8');
}

// 5. สร้างโครงตารางแนวนอน
function generateMappingGrid() {
  const type = document.getElementById('uploadType').value;
  let targetTable = type.endsWith('s') ? type : type + 's';
  if (targetTable === 'surahss') targetTable = 'surahs';

  const dbColumns = dbSchemas[targetTable] || [];

  const thead = document.getElementById('mappingTableHead');
  thead.innerHTML = '';
  const headerTr = document.createElement('tr');

  const dropdownTbody = document.getElementById('mappingDropdowns');
  dropdownTbody.innerHTML = '';
  const dropdownTr = document.createElement('tr');

  dbColumns.forEach(dbCol => {
    const th = document.createElement('th');
    th.className = "p-3 font-mono text-xs whitespace-nowrap border-r border-blue-700 font-medium tracking-wider";
    th.innerText = dbCol;
    headerTr.appendChild(th);

    const td = document.createElement('td');
    td.className = "p-2 border-r border-blue-200 min-w-[150px]";
    
    let selectHTML = `<select class="map-select w-full p-1.5 border border-blue-300 rounded text-sm text-blue-800 font-bold focus:ring-2 focus:ring-blue-500 outline-none" data-dbcol="${dbCol}" onchange="renderPreviewRows()">
                        <option value="" class="font-normal text-gray-500">-- ข้าม (ปล่อยว่าง) --</option>`;
    
    uploadedHeaders.forEach((csvCol, index) => {
      const cleanDbCol = dbCol.toLowerCase().replace(/\s/g, '');
      const cleanCsvCol = csvCol.toLowerCase().replace(/\s/g, '');
      const isMatch = (cleanDbCol === cleanCsvCol) ? 'selected' : '';
      selectHTML += `<option value="${index}" ${isMatch}>${csvCol}</option>`;
    });
    
    selectHTML += `</select>`;
    td.innerHTML = selectHTML;
    dropdownTr.appendChild(td);
  });

  thead.appendChild(headerTr);
  dropdownTbody.appendChild(dropdownTr);

  document.getElementById('mappingSection').classList.remove('hidden');
  renderPreviewRows();
}

// 6. ดึงข้อมูลพรีวิวมาแสดง (แถว 3 เป็นต้นไป)
function renderPreviewRows() {
  const tbody = document.getElementById('previewRowsBody');
  tbody.innerHTML = '';
  const selects = document.querySelectorAll('.map-select');

  const previewCount = Math.min(3, rawCSVData.length - 1);

  for (let i = 1; i <= previewCount; i++) {
    const values = rawCSVData[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => {
      let val = v.trim().replace(/\r/g, '');
      if (val.startsWith('"') && val.endsWith('"')) val = val.substring(1, val.length - 1);
      return val;
    });

    const tr = document.createElement('tr');
    tr.className = "hover:bg-yellow-50 transition-colors";

    selects.forEach(select => {
      const td = document.createElement('td');
      td.className = "p-3 text-xs text-gray-700 border-r border-gray-100 truncate max-w-[150px]";
      
      const csvIndex = select.value;
      if (csvIndex !== "") {
        td.innerText = values[parseInt(csvIndex)] || '-';
      } else {
        td.innerText = '-';
        td.className += " text-gray-300 italic bg-gray-50"; 
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }
}

// 7. ยืนยันนำเข้าข้อมูลขึ้น Supabase
async function processAndUpload() {
  showLoading('กำลังนำเข้าข้อมูล...');
  
  const type = document.getElementById('uploadType').value;
  let targetTable = type.endsWith('s') ? type : type + 's';
  if (targetTable === 'surahss') targetTable = 'surahs';
  const idField = dbSchemas[targetTable][0]; 

  const mappings = {};
  document.querySelectorAll('.map-select').forEach(select => {
    const dbCol = select.getAttribute('data-dbcol');
    const csvIndex = select.value;
    mappings[dbCol] = csvIndex !== "" ? parseInt(csvIndex) : null;
  });

  const insertData = [];

  for (let i = 1; i < rawCSVData.length; i++) {
    const values = rawCSVData[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => {
      let val = v.trim().replace(/\r/g, '');
      if (val.startsWith('"') && val.endsWith('"')) val = val.substring(1, val.length - 1);
      return val;
    });
    
    let rowObj = {};
    let hasId = false; 

    for (const [dbCol, csvIndex] of Object.entries(mappings)) {
      let finalValue = (csvIndex !== null && values[csvIndex] !== undefined) ? values[csvIndex] : '';

      if (dbCol === 'isActive' || dbCol === 'hasAssessment') {
        finalValue = (finalValue.toUpperCase() === 'FALSE' || finalValue === '0') ? false : true;
      } 
      else if (finalValue === '') {
        finalValue = null;
      }

      rowObj[dbCol] = finalValue;
      if (dbCol === idField && finalValue !== null) hasId = true;
    }
    
    if (hasId) insertData.push(rowObj);
  }

  try {
    if (insertData.length === 0) throw new Error('ไม่พบข้อมูลที่จับคู่ได้ หรือ รหัสอ้างอิง(ID) ว่างเปล่า');

    const tableNameDB = targetTable.charAt(0).toUpperCase() + targetTable.slice(1);
    
    const { error } = await supabaseClient.from(tableNameDB).upsert(insertData);
    if (error) throw error; 

    hideLoading();
    resetUploadUI(); 
    showToast(`นำเข้าข้อมูลสำเร็จ ${insertData.length} รายการ!`, 'success');
    
  } catch (err) {
    hideLoading();
    console.error(err);
    
    // 🛠️ เรียกใช้ Modal สวยๆ แทน Alert แข็งๆ
    let errorMsg = err.message;
    if (err.code === '23503' || errorMsg.includes('foreign key constraint')) {
      errorMsg = 'รหัสอ้างอิงในไฟล์ (เช่น รหัสครู, รหัสผู้ปกครอง) ยังไม่มีอยู่ในฐานข้อมูลหลักของระบบ!<br><br><b>💡 วิธีแก้:</b> กดปิดหน้าต่างนี้ แล้วเปลี่ยน Dropdown ของคอลัมน์นั้นให้เป็น <b>"-- ข้าม (ปล่อยว่าง) --"</b> แล้วกดอัปโหลดใหม่อีกครั้งครับ';
      
      showErrorModal('❌ ข้อมูลอ้างอิงไม่ตรงกัน (Foreign Key Error)', errorMsg);
    } else {
      showErrorModal('❌ เกิดข้อผิดพลาดในการอัปโหลด', errorMsg);
    }
  }
}

// 📥 ฟังก์ชันดาวน์โหลดเทมเพลต CSV 
// ============================================
function downloadTemplate(type) {
  let content = '';
  let filename = '';
  
  // รองรับทั้งแบบเติม 's' และไม่เติม 's' ป้องกันบั๊กจากหน้า HTML
  switch(type) {
    case 'teachers':
    case 'teacher':
      // เพิ่ม isActive, photoUrl
      content = 'teacherId,firstName,lastName,classRoom,phone,email,role,isActive,photoUrl\nT007,ซัลมา,อาหมัด,Q-TSP 2/1,081-234-5607,salma@school.th,teacher,TRUE,\nT008,ฮานี,อิบรอฮีม,Q-STEM 3/1,081-234-5608,hani@school.th,teacher,TRUE,';
      filename = 'teachers_template.csv';
      break;

    case 'students':
    case 'student':
      // เพิ่ม pin4, isActive, photoUrl
      content = 'studentId,firstName,lastName,classRoom,teacherId,programId,parentId,pin4,isActive,photoUrl\nS011,มูซา,อาลี,Q-TSP 1/1,T001,P01,P011,1234,TRUE,\nS012,ยาซิน,อุมัร,Q-TSP 1/1,T001,P01,P012,5678,TRUE,';
      filename = 'students_template.csv';
      break;

    case 'parents':
    case 'parent':
      // เพิ่ม isActive, photoUrl
      content = 'parentId,firstName,lastName,phone,email,studentIds,isActive,photoUrl\nP011,ซะอีด,อาลี,089-111-0011,said11@parent.th,S011,TRUE,\nP012,ตอลฮะห์,อุมัร,089-111-0012,talhah@parent.th,S012,TRUE,';
      filename = 'parents_template.csv';
      break;
  }
  
  // เพิ่ม BOM สำหรับ UTF-8 (ตามท่าไม้ตายของคุณครู)
  const blob = new Blob(['\uFEFF' + content], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  
  // สั่งคลิกและล้างข้อมูล
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  showToast('ดาวน์โหลด Template สำเร็จ', 'success');
}

// ============================================
// 📤 Admin: CSV Upload (เวอร์ชันล็อกเป้าคอลัมน์ - จบปัญหา 100%)
// ============================================
async function uploadCSV() {
  const typeRaw = document.getElementById('uploadType').value;
  // ปรับชื่อ type ให้เป็นพหูพจน์เสมอ ป้องกันบั๊ก (teachers, students, parents)
  const type = typeRaw.replace(/s$/, '') + 's'; 
  const file = document.getElementById('csvFile').files[0];
  
  if (!file) {
    showToast('กรุณาเลือกไฟล์', 'warning');
    return;
  }
  
  const reader = new FileReader();
  reader.onload = async function(e) {
    let csv = e.target.result;
    showLoading('กำลังนำเข้าข้อมูล...');
    
    try {
      // 1. จัดการปัญหาบรรทัดใหม่จาก Excel Mac/Windows และลบอักขระขยะ
      csv = csv.replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/^\uFEFF/, '');
      const lines = csv.split('\n').filter(l => l.trim() !== '');
      
      if (lines.length < 2) throw new Error('ไฟล์ว่างเปล่าหรือไม่มีข้อมูล');

      // 🛡️ 2. ล็อกโครงสร้างคอลัมน์ที่ "ถูกต้อง 100%" ไว้เลย (ไม่ต้องพึ่งหัวตารางจากไฟล์)
      const schema = {
        'teachers': ['teacherId', 'firstName', 'lastName', 'classRoom', 'phone', 'email', 'role', 'isActive', 'photoUrl'],
        'students': ['studentId', 'firstName', 'lastName', 'classRoom', 'teacherId', 'programId', 'parentId', 'pin4', 'isActive', 'photoUrl'],
        'parents':  ['parentId', 'firstName', 'lastName', 'phone', 'email', 'studentIds', 'isActive', 'photoUrl']
      };
      
      const expectedHeaders = schema[type];
      const tableName = type.charAt(0).toUpperCase() + type.slice(1); // แปลงเป็น Teachers, Students, Parents
      const insertData = [];

      // 3. วนลูปอ่านข้อมูล (เริ่มจาก i = 1 คือ "ข้ามหัวตารางของไฟล์" ไปเลย)
      for (let i = 1; i < lines.length; i++) {
        // แยกข้อมูลด้วย comma โดยไม่ยุ่งกับข้อมูลในเครื่องหมายคำพูด ""
        const values = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => {
          let val = v.trim();
          if (val.startsWith('"') && val.endsWith('"')) {
             val = val.substring(1, val.length - 1);
          }
          return val;
        });
        
        // เช็คว่าช่องแรก (ID) ว่างหรือไม่ ถ้าว่างให้ข้ามบรรทัดนี้ไปเลย (ป้องกัน Error null value)
        if (!values[0] || values[0] === '') continue;

        let rowObj = {};
        
        // 4. จับคู่ข้อมูลเข้ากับคอลัมน์ที่ล็อกไว้แบบเป๊ะๆ
        expectedHeaders.forEach((key, index) => {
          let val = values[index] !== undefined ? values[index] : '';
          
          if (key === 'isActive') {
            rowObj[key] = (val.toUpperCase() === 'FALSE' || val === '0') ? false : true;
          } else if (val === '') {
            rowObj[key] = null; // ส่ง null ให้ฐานข้อมูลแทน string ว่าง
          } else {
            rowObj[key] = val;
          }
        });
        
        insertData.push(rowObj);
      }

      if (insertData.length === 0) throw new Error('ไม่พบข้อมูลที่ถูกต้อง (หรือลืมใส่รหัส ID ในคอลัมน์แรก)');

      // 5. ดันข้อมูลขึ้น Supabase
      const { error } = await supabaseClient
        .from(tableName)
        .upsert(insertData);

      if (error) throw error;

      hideLoading();
      if (typeof cacheClearAll === "function") cacheClearAll(); 
      showToast(`นำเข้าข้อมูล ${insertData.length} รายการสำเร็จ!`, 'success');
      document.getElementById('csvFile').value = '';

    } catch (err) {
      hideLoading();
      console.error(err);
      showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
    }
  };
  
  reader.readAsText(file, 'UTF-8');
}

async function resetData() {
  showLoading('กำลังล้างข้อมูล...');
  try {
    // หมายเหตุ: Supabase API ป้องกันการลบตารางทั้งหมดโดยไม่มีเงื่อนไข (เพื่อป้องกันอุบัติเหตุ) 
    // เราจึงใช้ .neq('id', 0) ซึ่งเป็นเงื่อนไขที่ครอบคลุมทุกแถวเพื่อให้ลบได้ครับ
    
    const { error: err1 } = await supabaseClient.from('Logs').delete().neq('id', 0);
    if (err1) throw err1;

    const { error: err2 } = await supabaseClient.from('Students').delete().neq('id', 0);
    if (err2) throw err2;

    hideLoading();
    cacheClearAll();
    showToast('ล้างข้อมูลนักเรียนและบันทึกสำเร็จ', 'success');
    renderAdminSystem();
    
  } catch (err) {
    hideLoading();
    showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
  }
}

    const { error } = await supabaseClient

// 📸 Upload photo (Supabase Version)
async function handleProfilePhotoUpload(input, entityType, entityId) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    showToast('ไฟล์รูปภาพต้องขนาดไม่เกิน 2MB', 'warning');
    input.value = '';
    return;
  }

  showLoading('กำลังอัปโหลดรูปโปรไฟล์...');
  try {
    const folderName = entityType === 'teacher' ? 'teachers' : 'parents';
    const publicUrl = await uploadFileToSupabase(file, folderName);

    const tableName = entityType === 'teacher' ? 'Teachers' : 'Parents';
    const idField = entityType === 'teacher' ? 'teacherId' : 'parentId';

    const { error } = await supabaseClient.from(tableName).update({ photoUrl: publicUrl }).eq(idField, entityId);
    if (error) throw error;

    currentUser.photoUrl = publicUrl;
    saveUser(currentUser);
    
    hideLoading();
    showToast('เปลี่ยนรูปโปรไฟล์สำเร็จ', 'success');
    closeModal();
    renderMainApp(); 
  } catch (error) {
    hideLoading();
    showToast('เกิดข้อผิดพลาด: ' + error.message, 'error');
  }
}

// 💾 Save profile (Supabase Version)
async function saveMyProfile() {
  const data = {
    firstName: (document.getElementById('prof_prefix').value + ' ' + document.getElementById('prof_firstName').value.trim()).trim().replace(/\s+/g, ' '),
    lastName: document.getElementById('prof_lastName').value.trim(),
    phone: document.getElementById('prof_phone').value.trim(),
    email: document.getElementById('prof_email').value.trim()
  };

  showLoading('กำลังบันทึกข้อมูล...');
  try {
    const isStaff = ['admin', 'director', 'teacher'].includes(currentUser.role);
    const tableName = isStaff ? 'Teachers' : 'Parents';
    const idField = isStaff ? 'teacherId' : 'parentId';

    const { error } = await supabaseClient.from(tableName).update(data).eq(idField, currentUser.userId);
    if (error) throw error;

    currentUser.firstName = data.firstName;
    currentUser.lastName = data.lastName;
    currentUser.name = data.firstName + ' ' + data.lastName;
    currentUser.phone = data.phone;
    currentUser.email = data.email;
    saveUser(currentUser);
    
    cacheClearAll(); 
    hideLoading();
    showToast('บันทึกข้อมูลส่วนตัวสำเร็จ', 'success');
    closeModal();
    renderMainApp();
  } catch (error) {
    hideLoading();
    showToast('เกิดข้อผิดพลาด: ' + error.message, 'error');
  }
}
