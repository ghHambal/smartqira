// ============================================
// ⚙️ ตัวประมวลผลการเช็คขาด
// ============================================
async function executeAutoAbsent() {
  // ปิด Modal ยืนยันก่อน
  closeModal();
  
  showLoading('กำลังตรวจสอบและบันทึกข้อมูล...');
  try {
    const todayStr = new Date().toISOString().split('T')[0];
    
    // 1. หาเด็กในห้องของครูคนนี้
    const teacher = allTeachers.find(t => t.teacherId === currentUser.userId);
    if (!teacher || !teacher.classRoom) throw new Error('ไม่พบข้อมูลห้องเรียนของคุณ');
    const myStudents = allStudents.filter(s => s.classRoom === teacher.classRoom);
    
    if (myStudents.length === 0) {
      hideLoading();
      showToast('ไม่มีนักเรียนในห้องเรียนของคุณ', 'warning');
      return;
    }
    
    // 2. ดึง Log ของวันนี้เฉพาะเด็กในห้อง
    const { data: todayLogs, error: logErr } = await supabaseClient
      .from('Logs')
      .select('studentId')
      .gte('date', todayStr + ' 00:00:00')
      .lte('date', todayStr + ' 23:59:59');
    
    if (logErr) throw logErr;

    // 3. กรองหาเด็กที่ "ยังไม่มี Log" ในวันนี้
    const loggedStudentIds = new Set(todayLogs.map(l => l.studentId));
    const absentStudents = myStudents.filter(s => !loggedStudentIds.has(s.studentId));

    if (absentStudents.length === 0) {
      hideLoading();
      showToast('เยี่ยมมาก! นักเรียนทุกคนถูกประเมินครบแล้วในวันนี้', 'success');
      return;
    }

    // 4. สร้าง Payload ส่งข้อมูล "ขาดเรียน (ABSENT)" 
    const insertData = absentStudents.map(s => ({
      logId: 'LOG-' + Date.now() + '-' + Math.floor(Math.random() * 1000) + s.studentId,
      studentId: s.studentId,
      teacherId: currentUser.userId,
      date: todayStr,
      logType: 'ABSENT',
      juzNumber: 0,
      surahNumber: 0,
      surahName: '-',
      ayah: '-',
      score: 0,
      pages: 0,
      status: 'ABSENT',
      note: 'เช็คขาดอัตโนมัติ'
    }));

    // 5. บันทึกขึ้น Supabase รวดเดียว
    const { error: insertErr } = await supabaseClient.from('Logs').insert(insertData);
    if (insertErr) throw insertErr;

    hideLoading();
    
    // ล้าง Cache ที่เกี่ยวข้องทั้งหมด
    cacheClear('students_all');
    cacheClear(`students_teacher_${currentUser.userId}`);
    cacheClear(`dashboard_${currentUser.userId}_${currentUser.role}`);
    cacheClear(`logs_teacher_${currentUser.userId}`);
    cacheClear('logs_all');
    
    showToast(`เช็คขาดอัตโนมัติให้นักเรียน ${absentStudents.length} คน เรียบร้อยแล้ว`, 'success');
    
    // โหลดหน้าใหม่
    if (currentTab === 'students') renderStudents();
    else if (currentTab === 'dashboard') renderDashboard();

  } catch (error) {
    hideLoading();
    showToast('เกิดข้อผิดพลาด: ' + error.message, 'error');
  }
}

function silentRefreshCurrentTab() {
  if (!currentUser) return;
  
  const role = currentUser.role;
  const uid = currentUser.userId;

  if (currentTab === 'dashboard') {
    fetchDashboardSupabase(`dashboard_${uid}_${role}`, true);
    
  } else if (currentTab === 'students') {
    const key = role === 'teacher' ? `students_teacher_${uid}` : 'students_all';
    refreshStudentsData(key, true);
    
  } else if (currentTab === 'logs') {
    let key = 'logs_all';
    if (role === 'teacher') key = `logs_teacher_${uid}`;
    else if (role === 'parent') key = `logs_parent_${uid}`;

    if (role === 'teacher') key = `reports_teacher_${uid}`;
    else if (role === 'parent') key = `reports_parent_${uid}`;
    refreshReportsData(key, true);
    
  } else if (currentTab === 'mychildren') {
    refreshMyChildrenData(`mychildren_${uid}`, true);
  }
}

// 1. ฟังก์ชันสำรองข้อมูล (Download as JSON)
async function backupAllData() {
    showLoading('กำลังเตรียมไฟล์สำรองข้อมูล...');
    try {
        const { data: students } = await supabaseClient.from('Students').select('*');
        const { data: logs } = await supabaseClient.from('Logs').select('*');
        const { data: teachers } = await supabaseClient.from('Teachers').select('*');
        
        const backupData = {
            exportDate: new Date().toISOString(),
            schoolName: appSettings.schoolName,
            currentTerm: appSettings.currentTerm,
            data: { students, logs, teachers }
        };

        const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Backup_HifzTrack_${appSettings.currentTerm.replace('/','_')}_${new Date().toLocaleDateString()}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        hideLoading();
        showToast('📦 สำรองข้อมูลสำเร็จ! โปรดเก็บไฟล์นี้ไว้ในที่ปลอดภัย', 'success');
    } catch (error) {
        hideLoading();
        showToast('เกิดข้อผิดพลาดในการสำรองข้อมูล', 'error');
    }
}

// 1. ฟังก์ชันดักจับไฟล์ตอนกดปุ่ม Restore Data
function handleBackupFileSelect(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (!data || !data.data || !data.data.students) {
                throw new Error('โครงสร้างไฟล์ไม่ถูกต้อง หรือไม่ใช่ไฟล์ Backup ของระบบนี้');
            }
            tempBackupData = data.data; // เก็บ { students, teachers, logs } ไว้ในความจำ
            input.value = ''; // เคลียร์ช่อง input
            showDangerModal('restore'); // เรียก Modal ขึ้นมาให้ยืนยัน
        } catch (error) {
            showToast('ไฟล์ไม่รองรับ: ' + error.message, 'error');
            input.value = '';
        }
    };
    reader.readAsText(file);
}

// 3. ตรวจสอบการพิมพ์คำยืนยัน
function validateDangerAction(expectedWord, actionFn) {
    const input = document.getElementById('dangerConfirmInput').value.trim().toUpperCase();
    if (input !== expectedWord) {
        showToast('คำยืนยันไม่ถูกต้อง โปรดพิมพ์ให้ตรงกัน', 'error');
        document.getElementById('dangerConfirmInput').classList.add('border-red-500', 'bg-red-50');
        setTimeout(() => document.getElementById('dangerConfirmInput').classList.remove('border-red-500', 'bg-red-50'), 1000);
        return;
    }
    actionFn(); // ถ้าพิมพ์ถูก ให้เรียกฟังก์ชันลบ/นำเข้า จริง
}

async function executeClearLogs() {

// 5. ฟังก์ชันเริ่มเทอมใหม่จริง (แก้ไข Error loadSettings)
async function executeStartNewTerm() {
    const nextTerm = document.getElementById('newTermInput').value.trim();
    if (!nextTerm) {
        showToast('โปรดระบุเทอมใหม่', 'warning');
        return;
    }

    showLoading('กำลังเตรียมการเริ่มเทอมใหม่...');
    try {
        // 1. อัปเดตขึ้นฐานข้อมูล
        const { error: settingsError } = await supabaseClient.from('Settings').upsert([{ key: 'currentTerm', value: nextTerm }], { onConflict: 'key' });
        if (settingsError) throw settingsError;

        // 2. ลบประวัติเก่า
        const { error: logsError } = await supabaseClient.from('Logs').delete().neq('studentId', '0');
        if (logsError) throw logsError;

        // ⚡ 3. แก้ไขตรงนี้: อัปเดตตัวแปรในเครื่องแทนการเรียกฟังก์ชันที่ไม่มีอยู่จริง
        appSettings.currentTerm = nextTerm; 

        hideLoading();
        cacheClearAll();
        closeModal();
        showToast(`🚀 เริ่มต้นปีการศึกษา ${nextTerm} เรียบร้อยแล้ว!`, 'success');
        
        // รีเฟรชหน้าจอทั้งหมดให้เป็นเทอมใหม่
        renderMainApp();
    } catch (error) {
        hideLoading();
        showToast('เกิดข้อผิดพลาด: ' + error.message, 'error');
    }
}

// 6. ฟังก์ชัน นำเข้าข้อมูล (Restore) จริง!!
async function executeRestoreBackup() {
    if (!tempBackupData) return;
    showLoading('กำลังนำเข้าข้อมูล (อาจใช้เวลาสักครู่)...');
    try {
        // อัปเดตตาราง Teachers
        if (tempBackupData.teachers && tempBackupData.teachers.length > 0) {
            const { error } = await supabaseClient.from('Teachers').upsert(tempBackupData.teachers, { onConflict: 'teacherId' });
            if (error) throw error;
        }
        // อัปเดตตาราง Students
        if (tempBackupData.students && tempBackupData.students.length > 0) {
            const { error } = await supabaseClient.from('Students').upsert(tempBackupData.students, { onConflict: 'studentId' });
            if (error) throw error;
        }
        // อัปเดตตาราง Logs
        if (tempBackupData.logs && tempBackupData.logs.length > 0) {
            const { error } = await supabaseClient.from('Logs').upsert(tempBackupData.logs, { onConflict: 'id' });
            if (error) throw error;
        }

        hideLoading();
        tempBackupData = null; // ล้างข้อมูลจากความจำ
        cacheClearAll();
        closeModal();
        showToast('📥 นำเข้าข้อมูลสำเร็จเรียบร้อยแล้ว!', 'success');
        renderAdminSystem(); // รีเฟรชหน้าดูสถิติใหม่
    } catch (error) {
        hideLoading();
        showToast('เกิดข้อผิดพลาดในการนำเข้า: ' + error.message, 'error');
    }
}

async function executeStatsExport() {
  const targetClass = document.getElementById('exportStatsClass').value;
  const selectedCb = document.querySelectorAll('.stats-export-col:checked');
  
  if (selectedCb.length === 0) {
    showToast('กรุณาเลือกสถิติอย่างน้อย 1 รายการ', 'warning');
    return;
  }
  
  const colsToExport = Array.from(selectedCb).map(cb => cb.value);
  const colLabels = Array.from(selectedCb).map(cb => cb.nextElementSibling.textContent.trim());

  showLoading('กำลังคำนวณสถิติ...');
  
  try {
    // 1. ดึงรายชื่อนักเรียนตามขอบเขต
    let stdQuery = supabaseClient.from('Students').select('studentId, firstName, lastName, classRoom').eq('isActive', true);
    if (targetClass !== 'ALL') stdQuery = stdQuery.eq('classRoom', targetClass);
    
    const { data: students, error: err1 } = await stdQuery;
    if (err1) throw err1;
    if (!students || students.length === 0) throw new Error('ไม่พบข้อมูลนักเรียน');

    const sIds = students.map(s => s.studentId);

    // 2. ดึงประวัติการท่อง (Logs) ของนักเรียนกลุ่มนี้
    const { data: logs, error: err2 } = await supabaseClient.from('Logs').select('*').in('studentId', sIds);
    if (err2) throw err2;

    // 3. 🧮 คำนวณสรุปยอด (Data Crunching)
    // เราจะสร้างโครงสร้างพื้นฐานที่มี รหัส, ชื่อ, นามสกุล, ห้องเรียน เสมอ
    let csvContent = "\uFEFFรหัสนักเรียน,ชื่อ,นามสกุล,ห้องเรียน," + colLabels.join(',') + "\n";
    
    students.forEach(student => {
        // กรองเอาเฉพาะ log ของเด็กคนนี้
        const sLogs = logs.filter(l => l.studentId === student.studentId);
        
        // นับสถิติต่างๆ
        const stats = {
            totalLogs: sLogs.length,
            sabaq: sLogs.filter(l => l.logType === 'سبق').length,
            sabqi: sLogs.filter(l => l.logType === 'سبقي').length,
            manzil: sLogs.filter(l => l.logType === 'منزل').length,
            nazirah: sLogs.filter(l => l.logType === 'نزيرة').length,
            qiraati: sLogs.filter(l => l.logType === 'قراءتي').length,
            totalPages: sLogs.reduce((sum, l) => sum + (Number(l.pages) || 0), 0).toFixed(1),
            avgScore: (() => {
                const scoredLogs = sLogs.filter(l => Number(l.score) > 0);
                if (scoredLogs.length === 0) return 0;
                const totalScore = scoredLogs.reduce((sum, l) => sum + Number(l.score), 0);
                return (totalScore / scoredLogs.length).toFixed(1);
            })()
        };

        // เอาข้อมูลมาต่อกัน
        let rowData = [
            student.studentId,
            `"${student.firstName}"`,
            `"${student.lastName}"`,
            student.classRoom
        ];

        // เติมข้อมูลสถิติที่เลือก
        colsToExport.forEach(col => {
            rowData.push(stats[col]);
        });

        csvContent += rowData.join(',') + "\n";
    });

    // 4. ดาวน์โหลดไฟล์
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = `Stats_Summary_${targetClass}_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    hideLoading();
    closeModal();
    showToast('ดาวน์โหลดสถิติสำเร็จ!', 'success');
  } catch (err) {
    hideLoading();
    showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
  }
}


</script>

<script>
  (function initPWA() {
    // ดึงลิงก์โลโก้จากระบบ ถ้าไม่มีให้ใช้ไอคอนมาตรฐาน
    const appLogo = appSettings.logoUrl || "https://cdn-icons-png.flaticon.com/512/3389/3389081.png";
    const appName = appSettings.appName || "Hifz Tracker Pro";

    // 1. จัดการ Apple Touch Icon (สำหรับ iOS)
    let appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
    if (!appleIcon) {
      appleIcon = document.createElement('link');
      appleIcon.rel = 'apple-touch-icon';
      document.head.appendChild(appleIcon);
    }
    appleIcon.href = appLogo;

    // 2. สร้างและฉีด Manifest (สำหรับ Android/Chrome)
    const manifestData = {
      name: appName,
      short_name: "Hifz Pro",
      start_url: window.location.href,
      display: "standalone",
      background_color: "#ffffff",
      theme_color: appSettings.primaryColor || "#2E7D32",
      icons: [
        {
          src: appLogo,
          sizes: "512x512",
          type: "image/png",
          purpose: "any maskable" 
        }
      ]
    };
    
    const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/json' });
    const manifestLink = document.createElement('link');
    manifestLink.rel = 'manifest';
    manifestLink.href = URL.createObjectURL(manifestBlob);
    document.head.appendChild(manifestLink);

    // 3. ลงทะเบียน Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
          self.addEventListener('install', (e) => { self.skipWaiting(); });
          self.addEventListener('activate', (e) => { return self.clients.claim(); });
          self.addEventListener('fetch', (e) => { });
        `;
        const swBlob = new Blob([swCode], { type: 'application/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(swBlob))
          .then(() => console.log('📱 PWA Ready with Dynamic Icon!'))
          .catch(err => console.log('PWA Setup warning: ', err));
      });
    }
  })();
</script>
