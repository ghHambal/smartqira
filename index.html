function cacheSet(key, data) {
  try {
    const item = {
      data: data,
      timestamp: Date.now(),
      version: '2.0'
    };
    localStorage.setItem('hifzCache_' + key, JSON.stringify(item));
  } catch (e) {
    console.warn('Cache write failed:', e);
    // ถ้า localStorage เต็ม → ล้าง cache เก่า
    if (e.name === 'QuotaExceededError') {
      cacheClearAll();
    }
  }
}

function cacheGet(key) {
  try {
    const stored = localStorage.getItem('hifzCache_' + key);
    if (!stored) return null;
    
    const item = JSON.parse(stored);
    if (!item || !item.timestamp) return null;
    
    // Check version (clear old version cache)
    if (item.version !== '2.0') {
      cacheClear(key);
      return null;
    }
    
    // Check expiration
    const config = CACHE_CONFIG[key] || { duration: 5 * 60 * 1000 };
    const age = Date.now() - item.timestamp;
    
    if (age > config.duration) {
      cacheClear(key);
      return null;
    }
    
    return item.data;
  } catch (e) {
    return null;
  }
}

function cacheClear(key) {
  try {
    localStorage.removeItem('hifzCache_' + key);
  } catch (e) {}
}

function cacheClearAll() {
  try {
    const keys = Object.keys(localStorage).filter(k => k.startsWith('hifzCache_'));
    keys.forEach(k => localStorage.removeItem(k));
  } catch (e) {}
}

// 🎯 Helper: โหลดข้อมูล (ใช้ cache ถ้ามี, ไม่มีก็เรียก server)
function loadWithCache(cacheKey, serverFn, onSuccess, onError) {
  const cached = cacheGet(cacheKey);
  if (cached) {
    // ใช้ cache
    console.log('📦 Cache HIT:', cacheKey);
    onSuccess(cached, true);
    return;
  }
  
  // โหลดจาก server
  console.log('🌐 Cache MISS:', cacheKey);
  serverFn(
    function(response) {
      if (response && response.success) {
        cacheSet(cacheKey, response);
      }
      onSuccess(response, false);
    },
    onError
  );
}

function splitPrefixAndName(fullName) {
    if (!fullName) return { prefix: '', name: '' };
    const prefixes = ['ด.ช.', 'ด.ญ.', 'นาย', 'นางสาว', 'นาง', 'ว่าที่ ร.ต.', 'ครู', 'อุสตาซ', 'อ.'];
    
    for (let p of prefixes) {
        if (fullName.startsWith(p)) {
            // ตัดคำนำหน้าออก และลบช่องว่างส่วนเกิน
            let namePart = fullName.substring(p.length).trim();
            return { prefix: p, name: namePart };
        }
    }
    return { prefix: '', name: fullName.trim() };
}

let _progressLoader = null;

function showProgressLoader(options) {
  const opt = options || {};
  const estimatedMs = (opt.estimatedSeconds || 10) * 1000;

  // ดึงค่าจาก settings
  const logoUrl = appSettings.logoUrl || '';
  const appName = appSettings.appName || 'Hifz Tracker Pro';

  const devFooter = appSettings.developerFooter || 'พัฒนาโดย KruHambaleeWaji 📱 064-323-0483';

  const messages = (appSettings.loadingMessages || '📡 กำลังเชื่อมต่อ...,📚 กำลังโหลดข้อมูล...,📊 กำลังคำนวณ...,✨ เกือบเสร็จแล้ว...')

  // HTML

    <div style="background: white; border-radius: 16px; box-shadow: 0 25px 50px rgba(0,0,0,0.25); max-width: 420px; width: 90%; overflow: hidden; animation: fadeIn 0.3s ease;">

      <!-- Header: Logo + App Name -->

        ${logoUrl
          ? `<img src="${logoUrl}" style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.3);">`
          : '<div style="width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 22px;">🕌</div>'
        }
        <div style="color: white;">
          <div style="font-weight: 700; font-size: 16px;">${appName}</div>
          <div style="font-size: 11px; opacity: 0.85;">${schoolName}</div>
        </div>
      </div>

      <!-- Hadith Section -->
      <div style="padding: 18px 20px; background: linear-gradient(135deg, #f5f0e8 0%, #faf8f4 100%); text-align: center;">
        <p dir="rtl" style="font-family: 'Scheherazade New', 'Traditional Arabic', serif; font-size: 22px; color: #1a1a1a; line-height: 1.8; margin-bottom: 8px;">
          ${hadithArabic}
        </p>
        ${hadithEnglish ? `<p style="font-size: 12px; color: #555; font-style: italic; line-height: 1.4; margin-bottom: 4px;">"${hadithEnglish}"</p>` : ''}
        ${hadithThai ? `<p style="font-size: 12px; color: #666; line-height: 1.4;">${hadithThai}</p>` : ''}
      </div>

      <!-- Progress Section -->
      <div style="padding: 20px 24px;">
        <!-- Progress Bar -->
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
          <div style="flex: 1; height: 10px; background: #e5e7eb; border-radius: 5px; overflow: hidden;">
            <div id="progressBar" style="height: 100%; width: 0%; border-radius: 5px; transition: width 0.3s ease; background: linear-gradient(90deg, var(--primary-color, #2E7D32), #66BB6A);"></div>
          </div>
          <span id="progressPercent" style="font-size: 14px; font-weight: 700; color: var(--primary-color, #2E7D32); min-width: 42px; text-align: right;">0%</span>
        </div>

        <!-- Status Message -->
        <p id="progressMessage" style="text-align: center; font-size: 14px; color: #374151; font-weight: 500; min-height: 22px;">
          ${messages[0] || 'กำลังโหลด...'}
        </p>
      </div>

      <!-- Tip Footer -->
      <div style="padding: 10px 20px; background: #f9fafb; border-top: 1px solid #e5e7eb;">
        <p style="font-size: 11px; color: #6b7280; text-align: center; line-height: 1.5;">
          💡 ${tip}
        </p>
      </div>

      <!-- Developer Footer -->
      <div style="padding: 8px 20px; background: #f3f4f6; border-top: 1px solid #e5e7eb; text-align: center;">
        <p style="font-size: 10px; color: #9ca3af;">${devFooter}</p>
      </div>
    </div>
  `;

  document.getElementById('loadingOverlay').classList.remove('hidden');

  // Animation State
  let current = 0;
  let msgIdx = 0;
  let finished = false;

  // Phase 1: 0 → 70% (fast)
  // Phase 2: 70 → 90% (slow)
  // Phase 3: stuck at 90 until finish() called
  const barEl = document.getElementById('progressBar');
  const pctEl = document.getElementById('progressPercent');
  const msgEl = document.getElementById('progressMessage');

  const intervalId = setInterval(() => {
    if (finished) return;

    if (current < 70) {
      current += 1.5 + Math.random() * 2;
    } else if (current < 90) {
      current += 0.2 + Math.random() * 0.3;
    } else {
      current = 90; // stuck
    }

    if (current > 90) current = 90;
    updateBar(current);
  }, 150);

  // Message rotation
  const msgIntervalId = setInterval(() => {
    if (finished) return;
    msgIdx = (msgIdx + 1) % messages.length;
    if (msgEl) {
      msgEl.style.opacity = '0';
      setTimeout(() => {
        if (msgEl) {
          msgEl.textContent = messages[msgIdx];
          msgEl.style.opacity = '1';
        }
      }, 200);
    }
  }, 2000);

  function updateBar(val) {
    const v = Math.min(100, Math.round(val));
    if (barEl) barEl.style.width = v + '%';
    if (pctEl) pctEl.textContent = v + '%';
  }

  // Loader API
  _progressLoader = {
    finish: function(delay) {
      finished = true;
      clearInterval(intervalId);
      clearInterval(msgIntervalId);

      // Animate 90 → 100
      let v = current;
      const finishInterval = setInterval(() => {
        v += 5;
        if (v >= 100) {
          v = 100;
          clearInterval(finishInterval);
          updateBar(100);
          if (msgEl) msgEl.textContent = '✅ โหลดเสร็จสมบูรณ์';
          setTimeout(() => hideProgressLoader(), delay || 400);
        }
        updateBar(v);
      }, 30);
    },

    fail: function(errorMsg) {
      finished = true;
      clearInterval(intervalId);
      clearInterval(msgIntervalId);

      if (barEl) barEl.style.background = '#ef4444';
      if (msgEl) {
        msgEl.textContent = '❌ ' + (errorMsg || 'เกิดข้อผิดพลาด');
        msgEl.style.color = '#dc2626';
      }

      setTimeout(() => hideProgressLoader(), 3000);
    },

    updateMessage: function(text) {
      if (msgEl) msgEl.textContent = text;
    }
  };

  return _progressLoader;
}

  const d = new Date(date);
  return d.toLocaleDateString('th-TH', {

  });
}

    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}

    return;
  }
  
  // 2. ถ้าไม่มี Cache ให้ใช้ Progress Loader และรอโหลดจาก Supabase
  const loader = showProgressLoader({ estimatedSeconds: 5 });
  await refreshSettingsSupabase(false, loader);
}

// ฟังก์ชันช่วยดึงค่าการตั้งค่าจาก Supabase
async function refreshSettingsSupabase(silent, loader) {
  try {
    const { data, error } = await supabaseClient.from('Settings').select('*');
    if (error) throw error;

    // แปลงข้อมูลจาก Array [{key, value}, ...] เป็น Object {key: value, ...}
    const settingsObj = {};
    data.forEach(item => {
      settingsObj[item.key] = item.value;
    });

    appSettings = settingsObj;
    cacheSet('settings', { success: true, settings: appSettings });
    applyTheme();

    if (loader) {
      loader.finish();
      setTimeout(function() {
        if (currentUser) renderMainApp(); else renderLogin();
      }, 500);
    }
  } catch (err) {
    console.error('Fetch Settings Error:', err);
    if (loader) loader.fail('โหลดการตั้งค่าไม่สำเร็จ: ' + err.message);
    else if (!silent) showToast('เกิดข้อผิดพลาดในการดึงข้อมูล', 'error');
  }
}

// State ระหว่างทำ enrollment (เก็บข้าม popup)
let enrollmentState = {};

function handleParentLogin() {
  const code = document.getElementById('parentLoginCode').value.trim();
  if (!code) {
    showToast('กรุณากรอกรหัส', 'warning');
    return;
  }

  // รูปแบบ: P001, P011, P023... → login ด้วย parentId
  if (/^P\d+$/i.test(code)) {
    loginByParentId(code.toUpperCase());
    return;
  }

  // รูปแบบ: studentId+pin4 (เช่น S0011234) → login ด้วย student code
  const last4 = code.slice(-4);
  const isFullCode = code.length >= 5 && /^\d{4}$/.test(last4);

  if (isFullCode) {
    loginByStudentCode(code);
    return;
  }

  // รูปแบบอื่น → assume ว่าเป็น studentId → เริ่ม enrollment
  startEnrollmentFlow(code);
}

// ============================================
// 👶 Login ด้วย รหัสนักเรียน + 4 ตัวท้าย ปชช. (เช่น S0011234) - Supabase Version
// ============================================
async function loginByStudentCode(code) {
  const loader = showProgressLoader({ estimatedSeconds: 5 });
  try {
    // แยก รหัสนักเรียน และ รหัส 4 ตัวท้ายออกจากกัน
    const studentId = code.slice(0, -4).toUpperCase();
    const pin4 = code.slice(-4);

    // 1. ค้นหาข้อมูลนักเรียนจากตาราง Students
    const { data: students, error: studentError } = await supabaseClient
      .from('Students')
      .select('*')
      .eq('studentId', studentId)
      .eq('isActive', true);

    if (studentError) throw studentError;

    if (!students || students.length === 0) {
      loader.fail('ไม่พบรหัสนักเรียนนี้ในระบบ');
      return;
    }

    const student = students[0];

    // 2. ตรวจสอบรหัส PIN 4 ตัวท้าย
    if (!student.pin4 || student.pin4 !== pin4) {
      loader.fail('รหัส 4 ตัวท้ายไม่ถูกต้อง (หรือยังไม่ลงทะเบียน)');
      return;
    }

    // 3. ถ้ารหัสถูก ดึงข้อมูลผู้ปกครองมาทำ Session
    if (student.parentId) {
      const { data: parents, error: parentError } = await supabaseClient
        .from('Parents')
        .select('*')
        .eq('parentId', student.parentId)
        .eq('isActive', true);

      if (parents && parents.length > 0) {
        const p = parents[0];
        const user = {
          userId: p.parentId,
          name: p.firstName + ' ' + p.lastName,
          firstName: p.firstName,
          lastName: p.lastName,
          role: 'parent',
          phone: p.phone,
          email: p.email,
          studentIds: p.studentIds
        };
        loader.finish();
        setTimeout(function() {
          saveUser(user);
          showToast('เข้าสู่ระบบสำเร็จ', 'success');
          renderMainApp();
        }, 500);
        return;
      }
    }

    // กรณีตกหล่น: กรอกรหัสถูกแต่ยังไม่มีข้อมูลในตารางผู้ปกครอง ให้เด้งไปหน้าลงทะเบียน
    loader.finish();
    setTimeout(function() {
      showToast('ข้อมูลผู้ปกครองไม่สมบูรณ์ โปรดลงทะเบียน', 'info');
      startEnrollmentFlow(studentId);
    }, 500);

  } catch (err) {
    loader.fail('เกิดข้อผิดพลาด: ' + err.message);
  }
}


// =========== ENROLLMENT FLOW (Supabase 100% - แก้ไขบั๊ก Join) ===========
async function startEnrollmentFlow(studentId) {
  enrollmentState = {
    studentId: studentId.toUpperCase(),
    student: null,
    pin4: null,
    parentData: null,
    childIds: [],
    extraChildrenData: []
  };

  showLoading('กำลังตรวจสอบข้อมูลนักเรียน...');
  try {
    // 1. ดึงข้อมูลนักเรียนเดี่ยวๆ ออกมาก่อน (ปลอดภัยกว่าการ Join)
    const { data: stdData, error: stdError } = await supabaseClient
      .from('Students')
      .select('*')
      .eq('studentId', enrollmentState.studentId)
      .eq('isActive', true)
      .single();

    if (stdError || !stdData) {
        throw new Error('ไม่พบข้อมูลนักเรียนรหัสนี้ หรือบัญชีถูกปิดการใช้งาน');
    }

    // ตรวจสอบว่ามีผู้ปกครองผูกไว้แล้วหรือยัง
    if (stdData.parentId) {
      hideLoading();
      showToast('นักเรียนคนนี้มีการลงทะเบียนผู้ปกครองเรียบร้อยแล้ว หากพบปัญหาโปรดติดต่อครูที่ปรึกษา', 'warning');
      return;
    }

    // 2. ดึงข้อมูลครูเพื่อเอาชื่อ (ถ้ามี)
    let teacherName = '-';
    if (stdData.teacherId) {
      const { data: tData } = await supabaseClient
        .from('Teachers')
        .select('firstName, lastName')
        .eq('teacherId', stdData.teacherId)
        .single();
      if (tData) teacherName = `${tData.firstName} ${tData.lastName}`;
    }

    // 3. ดึงข้อมูลโปรแกรมเพื่อเอาชื่อ (ถ้ามี)
    let programName = '-';
    if (stdData.programId) {
      const { data: pData } = await supabaseClient
        .from('Programs')
        .select('programName')
        .eq('programId', stdData.programId)
        .single();
      if (pData) programName = pData.programName;
    }

    // จัดรูปแบบข้อมูล
    enrollmentState.student = {
      ...stdData,
      teacherName: teacherName,
      programName: programName
    };
    
    enrollmentState.hasPin = !!stdData.pin4;

    hideLoading();
    if (enrollmentState.hasPin) {
      showStep2_ChildCount(); // ถ้ามี PIN แล้วให้ข้ามไปถามจำนวนลูกเลย
    } else {
      showStep1_ConfirmStudent();
    }
  } catch (err) {
    hideLoading();
    showToast(err.message, 'error');
    console.error('Enrollment Error:', err);
  }
}

// 👶 ค้นหาข้อมูลลูกคนอื่นๆ เพื่อตรวจสอบ (Preview)
async function previewChild(idx) {
  const input = document.getElementById('childId_' + idx);
  const preview = document.getElementById('childPreview_' + idx);
  if (!input || !preview) return;

  const id = input.value.trim().toUpperCase();
  enrollmentState.extraChildrenData[idx].studentId = id;
  enrollmentState.extraChildrenData[idx].verified = null;

  if (!id) { preview.classList.add('hidden'); return; }

  // เช็คซ้ำกับคนแรก
  if (id === enrollmentState.studentId) {
    preview.classList.remove('hidden');
    preview.className = 'rounded p-2 mb-2 text-xs bg-red-50 border border-red-200 text-red-700';
    preview.innerHTML = '❌ รหัสซ้ำกับคนที่ 1';
    return;
  }

  preview.classList.remove('hidden');
  preview.className = 'rounded p-2 mb-2 text-xs bg-gray-50 border border-gray-200 text-gray-500';
  preview.innerHTML = '⏳ กำลังค้นหา...';

  try {
    const { data, error } = await supabaseClient
      .from('Students')
      .select('*, Programs(programName)')
      .eq('studentId', id)
      .single();

    if (error || !data) {
      preview.className = 'rounded p-2 mb-2 text-xs bg-red-50 border border-red-200 text-red-700';
      preview.innerHTML = '❌ ไม่พบข้อมูลนักเรียน';
      return;
    }

    enrollmentState.extraChildrenData[idx].verified = data;
    preview.className = 'rounded p-2 mb-2 text-xs bg-green-50 border border-green-200 text-green-800';
    preview.innerHTML = `✓ <strong>${data.firstName} ${data.lastName}</strong><br>ห้อง: ${data.classRoom} • ${data.Programs ? data.Programs.programName : '-'}`;
  } catch (err) {
    preview.innerHTML = '❌ เกิดข้อผิดพลาด';
  }
}

// ⚙️ ตรวจสอบ PIN และผูกข้อมูลบุตรหลานรวดเดียว
async function submitStep2b() {
  const extraCount = enrollmentState.totalChildren - 1;
  const studentIdsToLink = [enrollmentState.studentId];
  const verifiedChildren = [enrollmentState.student];

  for (let i = 0; i < extraCount; i++) {
    const id = (document.getElementById('childId_' + i).value || '').trim().toUpperCase();
    const cid = (document.getElementById('childCid_' + i).value || '').trim();
    const pin = cid.slice(-4);

    if (!id || cid.length !== 13) {
      showToast(`กรุณากรอกข้อมูลคนที่ ${i + 2} ให้ครบถ้วน`, 'warning');
      return;
    }

    showLoading(`กำลังตรวจสอบข้อมูลคนที่ ${i + 2}...`);
    try {
      const { data, error } = await supabaseClient.from('Students').select('*').eq('studentId', id).single();
      if (error || !data) throw new Error(`ไม่พบรหัสนักเรียน ${id}`);
      
      if (data.pin4 && data.pin4 !== pin) {
        throw new Error(`รหัสยืนยันของ ${id} ไม่ถูกต้อง`);
      }

      // ตรวจสอบผ่าน บันทึก PIN
      if (!data.pin4) {
        await supabaseClient.from('Students').update({ pin4: pin }).eq('studentId', id);
      }
      
      studentIdsToLink.push(id);
      verifiedChildren.push(data);
    } catch (err) {
      hideLoading();
      showToast(err.message, 'error');
      return;
    }
  }

  enrollmentState.childIds = studentIdsToLink;
  enrollmentState.verifiedChildren = verifiedChildren;
  hideLoading();
  showStep2c_Summary();
}

// 💾 บันทึกข้อมูลผู้ปกครองและผูกรหัสนักเรียน (Final Step)
async function submitStep3() {
  const parentData = {
    firstName: document.getElementById('parentFirstName').value.trim(),
    lastName: document.getElementById('parentLastName').value.trim(),
    phone: document.getElementById('parentPhone').value.trim(),
    email: document.getElementById('parentEmail').value.trim(),
    studentIds: enrollmentState.childIds.join(','),
    isActive: true,
    parentId: 'P' + Date.now().toString().slice(-6) // สร้างรหัสผู้ปกครอง
  };

  if (!parentData.firstName || !parentData.lastName || !parentData.phone) {
    showToast('กรุณากรอกข้อมูลที่จำเป็น (*) ให้ครบถ้วน', 'warning');
    return;
  }

  showLoading('กำลังบันทึกข้อมูลผู้ปกครอง...');
  try {
    // 1. เพิ่มข้อมูลลงตาราง Parents
    const { error: pError } = await supabaseClient.from('Parents').insert([parentData]);
    if (pError) throw pError;

    // 2. อัปเดตตาราง Students ทุกคนให้มี parentId นี้
    const { error: sError } = await supabaseClient
      .from('Students')
      .update({ parentId: parentData.parentId })
      .in('studentId', enrollmentState.childIds);
    
    if (sError) throw sError;

    hideLoading();
    showStepSuccess(parentData.parentId);
  } catch (err) {
    hideLoading();
    showToast('ลงทะเบียนไม่สำเร็จ: ' + err.message, 'error');
  }
}

function switchTab(tabId) {
  currentTab = tabId;
  
  // อัปเดต Active Tab
  document.querySelectorAll('.nav-tab').forEach(el => {
    el.classList.remove('border-b-2');
    el.style.borderBottomColor = '';
    el.style.color = '';
  });
  
  const activeTab = document.getElementById('tab-' + tabId);
  if (activeTab) {
    activeTab.style.borderBottomColor = 'var(--primary-color)';
    activeTab.style.color = 'var(--primary-color)';
  }
  
  // โหลดเนื้อหา
  switch(tabId) {
    case 'dashboard': renderDashboard(); break;
    case 'students': renderStudents(); break;
    case 'mychildren': renderMyChildren(); break;
    case 'logs': renderLogsTab(); break;
    case 'reports': renderReports(); break;
    case 'admin': renderAdminPanel(); break;
  }
}

async function renderDashboard() {
  const content = document.getElementById('mainContent');
  const dashKey = `dashboard_${currentUser.userId}_${currentUser.role}`;
  const cachedDash = cacheGet(dashKey);

  if (cachedDash) {
    // โหลดจาก Cache ขึ้นมาโชว์ก่อนทันที
    renderDashboardContent(cachedDash);
    // แอบโหลดข้อมูลใหม่ในพื้นหลัง
    fetchDashboardSupabase(dashKey, true);
    return;
  }

  const loader = showProgressLoader({ estimatedSeconds: 8 });
  fetchDashboardSupabase(dashKey, false, loader);
}

// ============================================
//  Dashboard (เวอร์ชัน Supabase - คำนวณฝั่ง Client)
// ============================================
async function fetchDashboardSupabase(cacheKey, silent, loader) {
  try {
    let stdQuery = supabaseClient.from('Students').select('*').eq('isActive', true);
    if (currentUser.role === 'teacher') {
      stdQuery = stdQuery.eq('teacherId', currentUser.userId);
    } else if (currentUser.role === 'parent') {
      stdQuery = stdQuery.eq('parentId', currentUser.userId);
    }

    const [stdReq, tchReq, progReq, surahReq] = await Promise.all([
      stdQuery,
      supabaseClient.from('Teachers').select('*').eq('isActive', true),
      supabaseClient.from('Programs').select('*').eq('isActive', true),
      supabaseClient.from('Surahs').select('*')
    ]);

    if (stdReq.error) throw stdReq.error;
    const students = stdReq.data || [];

    let logQuery = supabaseClient.from('Logs').select('*').order('date', { ascending: false });
    if (currentUser.role === 'teacher') {
      logQuery = logQuery.eq('teacherId', currentUser.userId);
    } else if (currentUser.role === 'parent') {
      const sIds = students.map(s => s.studentId);
      if (sIds.length > 0) {
        logQuery = logQuery.in('studentId', sIds);
      } else {
        logQuery = logQuery.eq('studentId', 'NONE');
      }
    }

    const logReq = await logQuery;
    if (logReq.error) throw logReq.error;

    const teachers = tchReq.data || [];
    const programs = progReq.data || [];
    const logs = logReq.data || [];
    const surahs = surahReq.data || [];

    allStudents = students; allTeachers = teachers;
    allPrograms = programs; allSurahs = surahs; allLogs = logs;

    const todayStr = new Date().toISOString().split('T')[0];
    const todayLogs = logs.filter(l => (l.date || '').startsWith(todayStr));

    let dashData = {
      totalStudents: students.length,
      todayLogs: todayLogs.length,
      needReview: logs.filter(l => l.status === 'NEED_REVIEW').length,
      totalTeachers: teachers.filter(t => t.role === 'teacher').length,
      classProgress: [], classRanking: [], studentRanking: [], logTypeStats: {}, teacherStatus: [], recentLogs: []
    };

    dashData.recentLogs = logs.slice(0, 10).map(l => {
      const st = students.find(s => s.studentId === l.studentId);
      return { ...l, studentName: st ? `${st.firstName} ${st.lastName}` : l.studentId };
    });

    const sevenDaysAgo = new Date();
    sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
    logs.filter(l => new Date(l.date || '') >= sevenDaysAgo).forEach(l => {
      dashData.logTypeStats[l.logType] = (dashData.logTypeStats[l.logType] || 0) + 1;
    });

    if (currentUser.role === 'admin' || currentUser.role === 'director') {
      const teacherList = teachers.filter(t => t.role === 'teacher' && t.classRoom && t.classRoom !== '-');
      dashData.teacherStatus = teacherList.map(t => {
        const classStds = students.filter(s => s.classRoom === t.classRoom);
        const classLogsToday = todayLogs.filter(l => classStds.some(s => s.studentId === l.studentId));
        const loggedStdIds = new Set(classLogsToday.map(l => l.studentId));
        const pct = classStds.length ? Math.round((loggedStdIds.size / classStds.length) * 100) : 0;
        return {
          teacherName: `${t.firstName} ${t.lastName}`,
          classRoom: t.classRoom,
          status: pct === 100 ? 'complete' : (pct > 0 ? 'partial' : 'none'),
          loggedToday: loggedStdIds.size, totalStudents: classStds.length, percentage: pct
        };
      });
    }

    const surahsByJuz = {};
    surahs.forEach(s => {
      if (!surahsByJuz[s.juz]) surahsByJuz[s.juz] = [];
      surahsByJuz[s.juz].push(s);
    });

    const classes = [...new Set(students.map(s => s.classRoom).filter(c => c && c !== '-'))];
    
    // 💡 1. คำนวณความคืบหน้าของห้องเรียน
    dashData.classProgress = classes.map(c => {
      const classStds = students.filter(s => s.classRoom === c);
      const t = teachers.find(th => th.classRoom === c && th.role === 'teacher');
      let totalCompletedJuz = 0, totalTargetJuz = 0;

      const progCounts = {};
      classStds.forEach(st => { if(st.programId) progCounts[st.programId] = (progCounts[st.programId] || 0) + 1; });
      const dominantProgId = Object.keys(progCounts).length > 0 ? Object.keys(progCounts).sort((a,b) => progCounts[b] - progCounts[a])[0] : '';
      const domProg = programs.find(p => p.programId === dominantProgId);
      const progName = domProg ? domProg.programName : '-';

      classStds.forEach(st => {
        const p = programs.find(pg => pg.programId === st.programId);
        if (p) totalTargetJuz += (Number(p.targetJuzPerTerm) || 0);

        const stLogs = logs.filter(l => l.studentId === st.studentId && l.status === 'PASS');
        const passedSurahs = new Set(stLogs.map(l => Number(l.surahNumber)));
        let completedJuz = 0;

        for (let juz = 1; juz <= 30; juz++) {
          const sInJuz = surahsByJuz[juz] || [];
          if (sInJuz.length > 0 && sInJuz.every(s => passedSurahs.has(Number(s.number)))) completedJuz++;
        }
        totalCompletedJuz += completedJuz;
      });

      const avgCompleted = classStds.length ? (totalCompletedJuz / classStds.length).toFixed(1) : 0;
      const avgTarget = classStds.length ? (totalTargetJuz / classStds.length).toFixed(1) : 0;
      const progPct = avgTarget > 0 ? Math.min(100, Math.round((avgCompleted / avgTarget) * 100)) : 0;
      
      const classLogsToday = todayLogs.filter(l => classStds.some(s => s.studentId === l.studentId));
      const loggedStdIds = new Set(classLogsToday.map(l => l.studentId));

      return {
        className: c, totalStudents: classStds.length,
        teacherName: t ? `${t.firstName} ${t.lastName}` : '-',
        programId: dominantProgId,
        programName: progName,
        avgCompletedJuz: parseFloat(avgCompleted), avgTargetJuz: parseFloat(avgTarget),
        progressPercentage: progPct, loggedToday: loggedStdIds.size,
        todayPercentage: classStds.length ? Math.round((loggedStdIds.size / classStds.length) * 100) : 0
      };
    });

    if (currentUser.role === 'teacher') {
      const myClass = teachers.find(t => t.teacherId === currentUser.userId)?.classRoom;
      dashData.classProgress = dashData.classProgress.filter(c => c.className === myClass);
    }
    dashData.classRanking = [...dashData.classProgress].sort((a,b) => b.progressPercentage - a.progressPercentage);

    // 💡 2. คำนวณอันดับนักเรียนรายบุคคล (ใหม่)
    dashData.studentRanking = students.map(st => {
      const p = programs.find(pg => pg.programId === st.programId);
      const stLogs = logs.filter(l => l.studentId === st.studentId);
      const passLogs = stLogs.filter(l => l.status === 'PASS');
      
      const passedSurahs = new Set(passLogs.map(l => Number(l.surahNumber)));
      let completedJuz = 0;
      for (let juz = 1; juz <= 30; juz++) {
        const sInJuz = surahsByJuz[juz] || [];
        if (sInJuz.length > 0 && sInJuz.every(s => passedSurahs.has(Number(s.number)))) completedJuz++;
      }

      const scoreLogs = stLogs.filter(l => Number(l.score) > 0);
      const avgScore = scoreLogs.length > 0 ? (scoreLogs.reduce((sum, l) => sum + Number(l.score), 0) / scoreLogs.length).toFixed(1) : 0;

      return {
        studentId: st.studentId,
        firstName: st.firstName,
        lastName: st.lastName,
        classRoom: st.classRoom || '-',
        grade: (st.classRoom || '-').split('/')[0].trim(), // หั่นเอาระดับชั้น
        programId: st.programId,
        programName: p ? p.programName : '-',
        targetJuz: p ? (Number(p.targetJuzPerTerm) || 0) : 0,
        completedJuz: completedJuz,
        passCount: passLogs.length,
        avgScore: parseFloat(avgScore)
      };
    });

    // เรียงอันดับ: ยุซ(มากสุด) -> ผ่าน(มากสุด) -> คะแนนเฉลี่ย(มากสุด)
    dashData.studentRanking.sort((a, b) => {
      if (b.completedJuz !== a.completedJuz) return b.completedJuz - a.completedJuz;
      if (b.passCount !== a.passCount) return b.passCount - a.passCount;
      return b.avgScore - a.avgScore;
    });

    currentDashData = dashData; 

    const response = { success: true, data: dashData };
    cacheSet(cacheKey, response);

    if (loader) {
      loader.finish();
      setTimeout(() => { if (currentTab === 'dashboard') renderDashboardContent(response); }, 500);
    } else {
      if (currentTab === 'dashboard') renderDashboardContent(response);
    }

  } catch (error) {
    if (loader) loader.fail('เกิดข้อผิดพลาด: ' + error.message);
    else if (!silent) showToast('เกิดข้อผิดพลาด: ' + error.message, 'error');
    console.error(error);
  }
}

        ];
        const maxCount = Math.max(...types.map(t => data.logTypeStats[t.key] || 0), 1);
        
        html += `
          <div class="bg-white rounded-xl shadow mb-6">
            <div class="p-5 border-b">
              <h3 class="font-bold text-gray-800">📊 สถิติการบันทึก 7 วันล่าสุด</h3>
              <p class="text-xs text-gray-500 mt-1">แยกตามประเภทการท่อง</p>
            </div>
            <div class="p-5 space-y-3">
              ${types.map(t => {
                const count = data.logTypeStats[t.key] || 0;
                const percent = Math.round((count / maxCount) * 100);
                return `
                  <div class="flex items-center gap-3">
                    <div class="w-32 flex-shrink-0">
                      <p class="text-sm font-medium text-gray-700">${t.icon} ${t.label}</p>
                      <p class="text-xs text-gray-500 arabic" dir="rtl" style="font-family: 'Scheherazade New', serif;">${t.key}</p>
                    </div>
                    <div class="flex-1 bg-gray-100 rounded-full h-6 relative overflow-hidden">
                      <div class="${t.color} h-full rounded-full transition-all flex items-center justify-end pr-2" style="width: ${percent}%; min-width: 40px;">
                        <span class="text-xs font-bold text-white">${count}</span>
                      </div>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }
      
      if ((role === 'director' || role === 'admin') && data.teacherStatus && data.teacherStatus.length > 0) {
        html += `
          <div class="bg-white rounded-xl shadow mb-6">
            <div class="p-5 border-b">
              <h3 class="font-bold text-gray-800">🧑‍🏫 สถานะการบันทึกของครู (วันนี้)</h3>
            </div>
            <div class="p-5 space-y-3">
              ${data.teacherStatus.map(t => {
                const statusColors = { complete: 'bg-green-100 text-green-700', partial: 'bg-yellow-100 text-yellow-700', none: 'bg-red-100 text-red-700' };
                const statusLabels = { complete: '✅ ครบแล้ว', partial: '⏳ กำลังบันทึก', none: '❌ ยังไม่บันทึก' };
                return `
                  <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                    <div>
                      <p class="font-medium text-gray-800">${t.teacherName}</p>
                      <p class="text-sm text-gray-600">${t.classRoom}</p>
                    </div>
                    <div class="text-right">
                      <span class="px-3 py-1 rounded-full text-xs font-medium ${statusColors[t.status]}">${statusLabels[t.status]}</span>
                      <p class="text-sm text-gray-600 mt-1">${t.loggedToday}/${t.totalStudents} (${t.percentage}%)</p>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }
      
      html += `
        <div class="bg-white rounded-xl shadow">
          <div class="p-5 border-b">
            <h3 class="font-bold text-gray-800">⏱️ บันทึกล่าสุด</h3>
          </div>
          <div class="divide-y">
            ${data.recentLogs.length === 0 ? '<p class="p-8 text-center text-gray-500">ยังไม่มีบันทึก</p>' :
              data.recentLogs.map(log => {
                const typeInfo = getLogTypeInfo(log.logType);
                return `
                  <div class="p-4 hover:bg-gray-50 flex items-center justify-between">
                    <div class="flex-1">
                      <div class="flex items-center gap-2 mb-1">
                        <span class="font-medium text-gray-800">${log.studentName}</span>
                        <span class="px-2 py-0.5 rounded text-xs ${typeInfo.color}">${typeInfo.label}</span>
                      </div>
                      <p class="text-sm text-gray-600">
                        ${log.surahName ? `ยุซ ${log.juzNumber} - ${log.surahName}` : '-'}
                        ${log.ayah ? ` • ${log.ayah}` : ''}
                      </p>
                    </div>
                    <div class="text-right">
                      ${log.score > 0 ? `<p class="text-sm">⭐ ${log.score}/5</p>` : ''}
                      <p class="text-xs text-gray-500">${formatDateTime(log.date)}</p>
                    </div>
                  </div>
                `;
              }).join('')
            }
          </div>
        </div>
      `;
      
      content.innerHTML = html;
      
      // 💡 สร้าง UI ของ 2 ตารางที่เราออกแบบไว้
      if (document.getElementById('dashClassProgressSection')) renderDashClassProgressUI();
      if (document.getElementById('dashStudentRankingSection')) renderDashStudentRankingUI();
}

// ============================================
// 💡 ฟังก์ชันใหม่: อันดับนักเรียน (Student Progress Ranking)
// ============================================
function renderDashStudentRankingUI() {
    const container = document.getElementById('dashStudentRankingSection');
    if (!container || !currentDashData || !currentDashData.studentRanking) return;

    let filtered = currentDashData.studentRanking;
    const isTeacher = currentUser.role === 'teacher';
    const cardTitle = isTeacher ? '🏆 อันดับนักเรียนห้องของคุณ' : '🏆 อันดับนักเรียนดีเด่น';

    // ถ้าเป็นครู บังคับดูเฉพาะนักเรียนห้องตัวเอง
    if (isTeacher) {
        const myClass = allTeachers.find(t => t.teacherId === currentUser.userId)?.classRoom;
        filtered = filtered.filter(s => s.classRoom === myClass);
    }

    // กรองค้นหา
    if (dashStudentSearchQuery) {
        const q = dashStudentSearchQuery.toLowerCase();
        filtered = filtered.filter(s => 
            s.firstName.toLowerCase().includes(q) || 
            s.lastName.toLowerCase().includes(q) ||
            s.studentId.toLowerCase().includes(q)
        );
    }

    // กรองด้วย Dropdown
    if (dashStudentGradeFilter) filtered = filtered.filter(s => s.grade === dashStudentGradeFilter);
    if (dashStudentClassFilter) filtered = filtered.filter(s => s.classRoom === dashStudentClassFilter);
    if (dashStudentProgFilter) filtered = filtered.filter(s => s.programId === dashStudentProgFilter);

    // เตรียม Dropdown Options
    const uniqueGrades = [...new Set(currentDashData.studentRanking.map(s => s.grade).filter(g => g !== '-'))].sort();
    const uniqueClasses = [...new Set(currentDashData.studentRanking.map(s => s.classRoom).filter(c => c !== '-'))].sort();
    const uniqueProgs = [...new Set(currentDashData.studentRanking.map(s => s.programId).filter(p => p))];

    // โชว์แค่ 100 คนแรกเพื่อป้องกันตารางยาวเกินไปและค้าง
    const displayList = filtered.slice(0, 100);

    const html = `
        <div class="bg-white rounded-xl shadow mb-6 border border-yellow-200">
            <div class="p-5 border-b bg-gradient-to-r from-yellow-50 to-white flex flex-col md:flex-row md:items-center justify-between gap-4 rounded-t-xl">
                <div>
                    <h3 class="font-bold text-gray-800">${cardTitle}</h3>
                    <p class="text-xs text-gray-500 mt-1">อิงจาก ยุซที่ผ่าน > จำนวนครั้งที่ผ่าน > คะแนนเฉลี่ย</p>
                </div>
                
                ${!isTeacher ? `
                <div class="flex flex-wrap items-center gap-2">
                    <div class="relative flex-1 min-w-[140px]">
                        <svg class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        <input type="text" id="dashStudentSearch" placeholder="ค้นหานักเรียน..." value="${dashStudentSearchQuery}" class="w-full pl-9 pr-3 py-2 border border-yellow-300 rounded-lg text-sm focus:outline-none focus:border-yellow-500">
                    </div>
                    <select id="dashStudentGradeFilter" class="px-3 py-2 border border-yellow-300 bg-white rounded-lg text-sm focus:outline-none focus:border-yellow-500 min-w-[100px]">
                        <option value="">ชั้นปี</option>
                        ${uniqueGrades.map(g => `<option value="${g}" ${dashStudentGradeFilter === g ? 'selected' : ''}>${g}</option>`).join('')}
                    </select>
                    <select id="dashStudentClassFilter" class="px-3 py-2 border border-yellow-300 bg-white rounded-lg text-sm focus:outline-none focus:border-yellow-500 min-w-[100px]">
                        <option value="">ห้อง</option>
                        ${uniqueClasses.map(c => `<option value="${c}" ${dashStudentClassFilter === c ? 'selected' : ''}>${c}</option>`).join('')}
                    </select>
                    <select id="dashStudentProgFilter" class="px-3 py-2 border border-yellow-300 bg-white rounded-lg text-sm focus:outline-none focus:border-yellow-500 min-w-[120px]">
                        <option value="">โปรแกรม</option>
                        ${uniqueProgs.map(pId => {
                            const prog = allPrograms.find(p => p.programId === pId);
                            return `<option value="${pId}" ${dashStudentProgFilter === pId ? 'selected' : ''}>${prog ? prog.programName : pId}</option>`;
                        }).join('')}
                    </select>
                </div>
                ` : ''}
            </div>
            
            <div class="p-5">
                ${displayList.length === 0 ? '<p class="text-center text-gray-500 py-6">ไม่พบข้อมูลนักเรียน</p>' : `
                <div class="overflow-x-auto rounded-lg border border-gray-200">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-yellow-100 text-yellow-800 text-sm">
                            <tr>
                                <th class="p-3 border-b font-bold text-center w-16">อันดับ</th>
                                <th class="p-3 border-b font-bold">ชื่อ - สกุล</th>
                                <th class="p-3 border-b font-bold text-center">รหัส</th>
                                <th class="p-3 border-b font-bold text-center">ห้อง</th>
                                <th class="p-3 border-b font-bold text-center">โปรแกรม</th>
                                <th class="p-3 border-b font-bold text-center">ผ่าน (ยุซ)</th>
                                <th class="p-3 border-b font-bold text-center">จำนวนผ่าน (ครั้ง)</th>
                                <th class="p-3 border-b font-bold text-center">คะแนนเฉลี่ย</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y text-sm">
                            ${displayList.map((s, index) => {
                                const rank = index + 1;
                                let rankClass = 'text-gray-700 font-bold';
                                let rankBadge = rank;
                                
                                if (rank === 1) { rankClass = 'text-yellow-600 text-lg'; rankBadge = '🥇'; }
                                else if (rank === 2) { rankClass = 'text-gray-500 text-lg'; rankBadge = '🥈'; }
                                else if (rank === 3) { rankClass = 'text-orange-600 text-lg'; rankBadge = '🥉'; }
                                
                                const passColor = s.completedJuz > 0 ? 'text-green-600' : 'text-gray-400';

                                return `
                                    <tr class="hover:bg-yellow-50 transition cursor-pointer" onclick="viewStudentDetail('${s.studentId}')">
                                        <td class="p-3 text-center ${rankClass}">${rankBadge}</td>
                                        <td class="p-3 font-medium text-gray-800">${s.firstName} ${s.lastName}</td>
                                        <td class="p-3 text-center text-xs text-gray-500">${s.studentId}</td>
                                        <td class="p-3 text-center"><span class="bg-gray-100 px-2 py-1 rounded text-xs">${s.classRoom}</span></td>
                                        <td class="p-3 text-center text-xs text-gray-600">${s.programName}</td>
                                        <td class="p-3 text-center font-bold ${passColor}">${s.completedJuz} <span class="text-xs text-gray-400">/${s.targetJuz}</span></td>
                                        <td class="p-3 text-center font-medium text-blue-600">${s.passCount}</td>
                                        <td class="p-3 text-center font-bold text-purple-600">${s.avgScore}</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
                ${filtered.length > 100 ? '<p class="text-xs text-center text-gray-400 mt-3">แสดงผลเพียง 100 อันดับแรก</p>' : ''}
                `}
            </div>
        </div>
    `;

    container.innerHTML = html;

    // ผูก Event Filters
    const searchEl = document.getElementById('dashStudentSearch');
    if (searchEl) {
        searchEl.addEventListener('input', debounce(function() {
            dashStudentSearchQuery = this.value;
            renderDashStudentRankingUI();
            setTimeout(() => {
                const el = document.getElementById('dashStudentSearch');
                if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
            }, 0);
        }, 300));
    }

    // ✅ วางโค้ดชุดนี้แทน
    const gradeFilterEl = document.getElementById('dashStudentGradeFilter');
    if (gradeFilterEl) {
        gradeFilterEl.addEventListener('change', function() {
            dashStudentGradeFilter = this.value;
            renderDashStudentRankingUI();
        });
    }

    const classFilterEl = document.getElementById('dashStudentClassFilter');
    if (classFilterEl) {
        classFilterEl.addEventListener('change', function() {
            dashStudentClassFilter = this.value;
            renderDashStudentRankingUI();
        });
    }

    const progFilterEl = document.getElementById('dashStudentProgFilter');
    if (progFilterEl) {
        progFilterEl.addEventListener('change', function() {
            dashStudentProgFilter = this.value;
            renderDashStudentRankingUI();
        });
    }
} // วงเล็บปิดฟังก์ชัน (อย่าลืมวงเล็บนี้นะครับ)

// ============================================
// ฟังก์ชันช่วยวาด โซนความคืบหน้าแต่ละชั้น (Dashboard Class Progress)
// ============================================
function renderDashClassProgressUI() {
    const container = document.getElementById('dashClassProgressSection');
    if (!container || !currentDashData || !currentDashData.classProgress) return;

    let filtered = currentDashData.classProgress;
    const isTeacher = currentUser.role === 'teacher';
    const cardTitle = isTeacher ? '📈 ความคืบหน้าห้องของคุณ' : '📈 ความคืบหน้าแต่ละชั้น';

    // 1. กรองด้วยช่องค้นหา
    if (dashClassSearchQuery) {
        const q = dashClassSearchQuery.toLowerCase();
        filtered = filtered.filter(c => 
            c.className.toLowerCase().includes(q) || 
            c.teacherName.toLowerCase().includes(q) ||
            c.programName.toLowerCase().includes(q)
        );
    }

    // 2. 💡 กรองด้วยระดับชั้น (ตัดข้อความก่อนเครื่องหมาย / เช่น ม.1/1 -> ม.1)
    if (dashGradeFilter) {
        filtered = filtered.filter(c => c.className.split('/')[0].trim() === dashGradeFilter);
    }

    // 3. กรองด้วยโปรแกรม
    if (dashClassFilter) {
        filtered = filtered.filter(c => c.programId === dashClassFilter);
    }

    // สร้างรายการตัวเลือกสำหรับ Dropdown (โปรแกรม และ ระดับชั้น)
    const uniqueProgs = [...new Set(currentDashData.classProgress.map(c => c.programId).filter(p => p))];
    const uniqueGrades = [...new Set(currentDashData.classProgress.map(c => c.className.split('/')[0].trim()))].sort();

    const html = `
        <div class="bg-white rounded-xl shadow mb-6">
            <div class="p-5 border-b flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h3 class="font-bold text-gray-800">${cardTitle}</h3>
                    <p class="text-xs text-gray-500 mt-1">แสดง ${filtered.length} / ${currentDashData.classProgress.length} ห้อง</p>
                </div>
                
                ${!isTeacher ? `
                <div class="flex flex-wrap items-center gap-2">
                    <div class="relative flex-1 min-w-[140px]">
                        <svg class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 transform -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        <input type="text" id="dashClassSearch" placeholder="ค้นหาห้อง, ครู..." value="${dashClassSearchQuery}" class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-green-500">
                    </div>

                    <select id="dashGradeFilter" class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-green-500 min-w-[120px]">
                        <option value="">🏫 ทุกชั้นเรียน</option>
                        ${uniqueGrades.map(g => `<option value="${g}" ${dashGradeFilter === g ? 'selected' : ''}>ชั้น ${g}</option>`).join('')}
                    </select>

                    <select id="dashClassFilter" class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-green-500 min-w-[120px]">
                        <option value="">📚 ทุกโปรแกรม</option>
                        ${uniqueProgs.map(pId => {
                            const prog = allPrograms.find(p => p.programId === pId);
                            return `<option value="${pId}" ${dashClassFilter === pId ? 'selected' : ''}>${prog ? prog.programName : pId}</option>`;
                        }).join('')}
                    </select>

                    <div class="bg-gray-100 rounded-lg p-1 flex">
                        <button onclick="switchDashClassView('card')" class="px-3 py-1.5 rounded text-xs font-medium transition ${dashClassViewMode === 'card' ? 'bg-white shadow text-green-700' : 'text-gray-600'}">Card</button>
                        <button onclick="switchDashClassView('table')" class="px-3 py-1.5 rounded text-xs font-medium transition ${dashClassViewMode === 'table' ? 'bg-white shadow text-green-700' : 'text-gray-600'}">Table</button>
                    </div>
                </div>
                ` : ''}
            </div>
            
            <div class="p-5">
                ${filtered.length === 0 ? '<p class="text-center text-gray-500 py-6">ไม่พบข้อมูลห้องเรียนที่ตรงกับเงื่อนไข</p>' : 
                  (dashClassViewMode === 'card' ? renderDashClassCards(filtered) : renderDashClassTable(filtered))}
            </div>
        </div>
    `;

    container.innerHTML = html;

    // ผูก Event Listener ทันทีที่วาด UI เสร็จ
    const searchEl = document.getElementById('dashClassSearch');
    if (searchEl) {
        searchEl.addEventListener('input', debounce(function() {
            dashClassSearchQuery = this.value;
            renderDashClassProgressUI();
            setTimeout(() => {
                const newSearch = document.getElementById('dashClassSearch');
                if (newSearch) {
                    newSearch.focus();
                    newSearch.setSelectionRange(newSearch.value.length, newSearch.value.length);
                }
            }, 0);
        }, 300));
    }

    const progFilterEl = document.getElementById('dashClassFilter');
    if (progFilterEl) {
        progFilterEl.addEventListener('change', function() {
            dashClassFilter = this.value;
            renderDashClassProgressUI();
        });
    }

    // 💡 ผูก Event Listener ให้ตัวกรองระดับชั้น
    const gradeFilterEl = document.getElementById('dashGradeFilter');
    if (gradeFilterEl) {
        gradeFilterEl.addEventListener('change', function() {
            dashGradeFilter = this.value;
            renderDashClassProgressUI();
        });
    }
}

// 💡 สลับมุมมองระหว่าง Card และ Table
function switchDashClassView(mode) {
    dashClassViewMode = mode;
    localStorage.setItem('hifzDashClassView', mode);
    renderDashClassProgressUI();
}

// 💡 วาดมุมมองแบบการ์ด (Card View)
function renderDashClassCards(classes) {
    return `
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            ${classes.map(c => {
                const progressColor = c.progressPercentage >= 80 ? 'bg-green-500' :
                                      c.progressPercentage >= 50 ? 'bg-yellow-500' :
                                      c.progressPercentage >= 20 ? 'bg-orange-500' : 'bg-red-500';
                
                const bgGradient = c.progressPercentage >= 80 ? 'from-green-50 to-green-100' :
                                   c.progressPercentage >= 50 ? 'from-yellow-50 to-yellow-100' :
                                   'from-gray-50 to-gray-100';
                
                const todayColor = c.todayPercentage === 100 ? 'text-green-600' :
                                   c.todayPercentage > 0 ? 'text-yellow-600' : 'text-red-600';
                return `
                  <div class="bg-gradient-to-br ${bgGradient} border-2 border-gray-200 rounded-xl p-4 hover:shadow-lg transition">
                    <div class="flex items-center justify-between mb-2">
                      <h4 class="font-bold text-gray-800 text-lg">${c.className}</h4>
                      <span class="px-2 py-0.5 rounded-full text-xs font-medium bg-white shadow-sm border border-gray-200">
                        ${c.totalStudents} คน
                      </span>
                    </div>
                    
                    <p class="text-xs text-gray-500 font-medium mb-1 line-clamp-1">โปรแกรม: ${c.programName}</p>
                    <p class="text-xs text-gray-600 mb-3 line-clamp-1">ครู: ${c.teacherName}</p>
                    
                    <div class="mb-3 bg-white bg-opacity-60 p-2 rounded-lg">
                      <div class="flex justify-between text-xs mb-1">
                        <span class="font-medium text-gray-700">ความคืบหน้า</span>
                        <span class="font-bold ${progressColor.replace('bg-', 'text-')}">${c.avgCompletedJuz}/${c.avgTargetJuz} ยุซ</span>
                      </div>
                      <div class="w-full bg-gray-200 rounded-full h-2.5">
                        <div class="${progressColor} h-2.5 rounded-full transition-all" style="width: ${c.progressPercentage}%"></div>
                      </div>
                      <p class="text-xs text-right mt-1 font-bold ${progressColor.replace('bg-', 'text-')}">${c.progressPercentage}%</p>
                    </div>
                    
                    <div class="flex items-center justify-between pt-2 border-t border-gray-300">
                      <span class="text-xs text-gray-600">บันทึกวันนี้</span>
                      <span class="text-sm font-bold ${todayColor}">
                        ${c.loggedToday}/${c.totalStudents} <span class="text-xs">(${c.todayPercentage}%)</span>
                      </span>
                    </div>
                  </div>
                `;
            }).join('')}
        </div>
    `;
}

// 💡 วาดมุมมองแบบตาราง (Table View)
function renderDashClassTable(classes) {
    return `
        <div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-100 text-gray-700 text-sm">
                    <tr>
                        <th class="p-3 border-b font-bold whitespace-nowrap">ห้องเรียน</th>

  const cachedTeachers = cacheGet('teachers');
  const cachedParents = cacheGet('parents');
  
  if (cached && cachedPrograms && cachedTeachers && cachedParents) {
    // ใช้ cache ทั้งหมด → แสดงทันที
    allStudents = cached.students;
    allPrograms = cachedPrograms.programs;
    allTeachers = cachedTeachers.teachers;
    allParents = cachedParents.parents;
    displayStudents();
    
    // Background refresh (silent)
    refreshStudentsData(cacheKey, true);

  }
  
// ไม่มี cache ครบ → ใช้ progress loader
const loader = showProgressLoader({ estimatedSeconds: 8 });
refreshStudentsData(cacheKey, false, loader);
}

// ==========================================
// 👦 โหลดข้อมูลนักเรียน (เวอร์ชัน Supabase)
// ==========================================
async function refreshStudentsData(cacheKey, silent, loader) {
  try {
    // 1. ดึงข้อมูลนักเรียน (ถ้าเป็นครู ดึงเฉพาะห้องตัวเอง, ถ้าแอดมิน/ผอ. ดึงทั้งหมด)
    let query = supabaseClient.from('Students').select('*').eq('isActive', true);
    if (currentUser.role === 'teacher') {
      query = query.eq('teacherId', currentUser.userId);
    }
    const { data: students, error: err1 } = await query;
    if (err1) throw err1;
    allStudents = students || [];

    // 2. ดึงข้อมูลโปรแกรม, ครู, และผู้ปกครอง (ดึงพร้อมกัน 3 ตารางเพื่อความเร็วสูงสุด ⚡)
    const [progRes, teachRes, parentRes] = await Promise.all([
      supabaseClient.from('Programs').select('*').eq('isActive', true),
      supabaseClient.from('Teachers').select('*').eq('isActive', true),
      supabaseClient.from('Parents').select('*').eq('isActive', true)
    ]);

    if (progRes.error) throw progRes.error;
    if (teachRes.error) throw teachRes.error;
    if (parentRes.error) throw parentRes.error;

    allPrograms = progRes.data || [];
    allTeachers = teachRes.data || [];
    allParents = parentRes.data || [];

    // 3. อัปเดต Cache ของระบบ
    cacheSet(cacheKey, { success: true, students: allStudents });
    cacheSet('programs', { success: true, programs: allPrograms });
    cacheSet('teachers', { success: true, teachers: allTeachers });
    cacheSet('parents', { success: true, parents: allParents });

    // 4. สั่งให้หน้าเว็บนำข้อมูลมาสร้างตาราง/การ์ดแสดงผล
    if (loader) {
      loader.finish();
      setTimeout(function() {
        if (currentTab === 'students' || currentTab === 'mychildren') displayStudents();
      }, 500);
    } else {
      if (!silent || currentTab === 'students' || currentTab === 'mychildren') displayStudents();
    }

  } catch (error) {
    if (loader) loader.fail('เกิดข้อผิดพลาด: ' + error.message);
    else if (!silent) showToast('เกิดข้อผิดพลาด: ' + error.message, 'error');
    console.error("Fetch Data Error: ", error);
  }
}

// Debounce helper (ถ้ายังไม่มี)
function debounce(fn, delay) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}

// ⚙️ Helper: สร้างสถิตินักเรียนจากข้อมูล Supabase
// ============================================
async function fetchReportFromSupabase(studentId) {
  const student = allStudents.find(s => s.studentId === studentId);
  if (!student) throw new Error('ไม่พบข้อมูลนักเรียนในระบบ');
  const program = allPrograms.find(p => p.programId === student.programId);

  // ดึงบันทึกทั้งหมดของเด็กคนนี้จาก Supabase
  const { data: logs, error } = await supabaseClient.from('Logs').select('*').eq('studentId', studentId).order('date', {ascending: false});
  if (error) throw error;

  if (allSurahs.length === 0) {
     const { data: surahData } = await supabaseClient.from('Surahs').select('*');
     if (surahData) allSurahs = surahData;
  }

  const passLogs = logs.filter(l => l.status === 'PASS');
  const scoreLogs = logs.filter(l => Number(l.score) > 0);
  const avgScore = scoreLogs.length > 0 ? (scoreLogs.reduce((acc, l) => acc + Number(l.score), 0) / scoreLogs.length).toFixed(1) : 0;

  const logTypeStats = {};
  logs.forEach(l => { logTypeStats[l.logType] = (logTypeStats[l.logType] || 0) + 1; });

  // 🗺️ คำนวณแผนที่ยุซ (Juz Progress)
  const juzProgress = {};
  for(let i=1; i<=30; i++) juzProgress[i] = { total: 0, passed: 0, completed: false, inProgress: false };

  const passedSurahs = new Set(passLogs.map(l => Number(l.surahNumber)));
  allSurahs.forEach(s => {
      const j = s.juz || s.juzNumber;
      if(j && juzProgress[j]) {
          juzProgress[j].total++;
          if(passedSurahs.has(Number(s.number || s.surahNumber))) juzProgress[j].passed++;
      }
  });

  let completedJuz = 0;
  for(let i=1; i<=30; i++) {
      if(juzProgress[i].total > 0) {
          if(juzProgress[i].passed >= juzProgress[i].total) { 
              juzProgress[i].completed = true;
              completedJuz++; 
          }
          else if(juzProgress[i].passed > 0) juzProgress[i].inProgress = true;
      }
  }

  // ==========================================
  // 📊 คำนวณสถิติรายเดือน (นับแผ่นเฉพาะ ท่องจำใหม่ 'سبق')
  // ==========================================
  const monthlyStats = {};
  
  passLogs.forEach(l => {
      if (!l.date) return;
      // ดึงปีและเดือนออกมา (เช่น "2026-05")
      const d = new Date(l.date);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const monthKey = `${yyyy}-${mm}`;

      // ถ้าเดือนนี้ยังไม่มีข้อมูล ให้สร้างโครงสร้างรอไว้
      if (!monthlyStats[monthKey]) {
          monthlyStats[monthKey] = {
              totalPages: 0,
              gradeCount: { 4: 0, 3.5: 0, 3: 0, 2.5: 0, 2: 0, 1.5: 0, 1: 0 }
          };
      }

      // ⚡ หัวใจสำคัญ: บวกจำนวนแผ่น เฉพาะที่เป็น "سبق" (ท่องจำใหม่) เท่านั้น!
      if (l.logType === 'سبق') {
          monthlyStats[monthKey].totalPages += (parseFloat(l.pages) || 0);
      }
  });

  // 🧮 ประมวลผล "เกรดรายเดือน" จากจำนวนแผ่นรวม (เฉพาะ سبق)
  Object.keys(monthlyStats).forEach(key => {
      const m = monthlyStats[key];
      const t = m.totalPages;
      
      // อิงเกณฑ์: 5 แผ่น=4, 4 แผ่น=3.5, 3.5 แผ่น=3, 3 แผ่น=2.5, 2.5 แผ่น=2, 2 แผ่น=1.5, 1 แผ่น=1
      if (t >= 5) m.gradeCount[4] = 1;
      else if (t >= 4) m.gradeCount[3.5] = 1;
      else if (t >= 3.5) m.gradeCount[3] = 1;
      else if (t >= 3) m.gradeCount[2.5] = 1;
      else if (t >= 2.5) m.gradeCount[2] = 1;
      else if (t >= 2) m.gradeCount[1.5] = 1;
      else if (t >= 1) m.gradeCount[1] = 1;
  });

  return { 
    student, 
    program, 
    totalLogs: logs.length, 
    passCount: passLogs.length, 
    reviewCount: logs.filter(l => l.status === 'NEED_REVIEW').length, 
    avgScore, 
    completedJuz, 
    logTypeStats, 
    juzProgress, 
    recentLogs: logs, 
    allLogs: logs,
    monthlyStats // 👈 ส่งข้อมูลรายเดือนไปให้หน้า พิมพ์รายงาน > สรุปภาคเรียน
  };
}

// ============================================
// 👤 Student Detail View - Supabase (สรุปประเมินรายเดือนอยู่ล่างสุด + เฉพาะเทอมปัจจุบัน)
// ============================================
async function viewStudentDetail(studentId) {
  showLoading('กำลังโหลดข้อมูล...');
  try {
    const r = await fetchReportFromSupabase(studentId);
    hideLoading();
    
    const s = r.student;
    const p = r.program;
    const progress = p && p.targetJuzPerTerm > 0 ? Math.min(100, Math.round((r.completedJuz / p.targetJuzPerTerm) * 100)) : 0;
    
    const juzCells = [];
    for (let j = 1; j <= 30; j++) {
      const jp = r.juzProgress[j];
      let color = 'bg-gray-200', textColor = 'text-gray-500';
      if (jp.completed) { color = 'bg-green-500'; textColor = 'text-white'; }
      else if (jp.inProgress) { color = 'bg-yellow-400'; textColor = 'text-white'; }
      juzCells.push(`<div class="juz-cell ${color} ${textColor} rounded-lg p-2 text-center font-bold text-sm" title="ยุซ ${j}: ${jp.passed}/${jp.total} ซูเราะห์">${j}</div>`);
    }

    // 📊 เตรียมข้อมูลสำหรับสร้างตารางสรุปผลการประเมินรายเดือน
    const currentTermStr = appSettings.currentTerm || '1/2569';
    const currentTermNum = parseInt(currentTermStr.split('/')[0] || '1'); // ดึงเลขเทอมปัจจุบัน (1 หรือ 2)
    const currentYear = parseInt(currentTermStr.split('/')[1] || '2569');
    
    const term1MonthsThai = (appSettings.term1MonthsThai || 'พ.ค., มิ.ย., ก.ค., ส.ค., ก.ย., ต.ค.').split(',').map(m=>m.trim());
    const term2MonthsThai = (appSettings.term2MonthsThai || 'พ.ย., ธ.ค., ม.ค., ก.พ., มี.ค., เม.ย.').split(',').map(m=>m.trim());

    const getMonthData = (monthNum, year) => {
        const mm = String(monthNum).padStart(2, '0');
        return r.monthlyStats[`${year}-${mm}`] || r.monthlyStats[`${year - 1}-${mm}`] || r.monthlyStats[`${year + 1}-${mm}`] || null;
    };

    const renderTermTable = (termNum, months, startMonth) => {
        let rows = '';
        let termPages = 0;
        for (let i = 0; i < 6; i++) {
            if (!months[i]) continue;
            let mNum = startMonth + i;
            let mYear = currentYear - 543;
            if (mNum > 12) { mNum -= 12; mYear += 1; }
            
            const mData = getMonthData(mNum, mYear);
            const pages = mData ? mData.totalPages : 0;
            termPages += pages;
            
            let grade = '-';
            if (pages >= 5) grade = '4';
            else if (pages >= 4) grade = '3.5';
            else if (pages >= 3.5) grade = '3';
            else if (pages >= 3) grade = '2.5';
            else if (pages >= 2.5) grade = '2';
            else if (pages >= 2) grade = '1.5';
            else if (pages >= 1) grade = '1';

            rows += `<tr class="border-b"><td class="py-2 text-sm">${months[i]}</td><td class="py-2 text-center text-sm font-medium ${pages>0?'text-green-600':''}">${pages > 0 ? pages.toFixed(1) : '-'}</td><td class="py-2 text-center text-sm font-bold ${grade!=='-'?'text-blue-600':''}">${grade}</td></tr>`;
        }
        return `
          <div class="bg-gray-50 rounded-lg p-4 border border-gray-200">
            <table class="w-full">
              <thead><tr class="text-xs text-gray-500 text-left border-b"><th class="pb-2">เดือน</th><th class="pb-2 text-center">จำนวนแผ่น</th><th class="pb-2 text-center">ระดับผลประเมิน</th></tr></thead>
              <tbody>${rows}</tbody>
              <tfoot><tr><td class="pt-2 font-bold text-sm">รวมทั้งเทอม</td><td class="pt-2 text-center font-bold text-green-700">${termPages.toFixed(1)}</td><td class="pt-2 text-center">-</td></tr></tfoot>
            </table>
          </div>`;
    };

    const notesLogs = r.allLogs.filter(l => l.note && l.note.trim() !== '' && l.note !== 'เช็คขาดอัตโนมัติ');
    const notesHtml = notesLogs.length > 0 ? `<div class="bg-white rounded-xl shadow p-6 mb-6 border-l-4 border-blue-500"><h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2"><span class="text-xl">📓</span> บันทึกเพิ่มเติมจากครู</h3><div class="space-y-3">${notesLogs.slice(0, 5).map(log => `<div class="bg-blue-50 border border-blue-100 p-4 rounded-lg relative"><p class="text-sm text-gray-800 font-medium mb-3">"${log.note}"</p><div class="flex justify-between items-center border-t border-blue-200 pt-2"><span class="text-xs text-blue-700 bg-blue-100 px-2 py-1 rounded font-medium">${log.surahName || log.logType}</span><span class="text-xs text-gray-500">${formatDate(log.date)}</span></div></div>`).join('')}</div></div>` : '';

    const html = `
      <div class="flex items-center justify-between mb-4">
        <button onclick="switchTab('${currentUser.role === 'parent' ? 'logs' : 'students'}')" class="text-gray-600 hover:text-gray-800 flex items-center gap-1 font-medium transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg> กลับ</button>
        
        ${currentUser.role === 'parent' ? `<button onclick="showParentEditStudentModal('${s.studentId}')" class="bg-white border-2 border-gray-200 hover:border-blue-500 text-blue-600 px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1 transition shadow-sm">✏️ แก้ไขโปรไฟล์</button>` : ''}
      </div>
      
      <div class="bg-white rounded-xl shadow p-6 mb-6">
        <div class="flex items-center gap-4 mb-6">
          ${s.photoUrl ? `<img src="${s.photoUrl}" class="w-20 h-20 rounded-full object-cover shadow-sm border">` : `<div class="w-20 h-20 rounded-full primary-bg flex items-center justify-center text-white font-bold text-2xl shadow-sm">${s.firstName.charAt(0)}</div>`}
          <div class="flex-1">
            <h2 class="text-2xl font-bold text-gray-800">${s.firstName} ${s.lastName}</h2>
            <p class="text-gray-600">รหัส: ${s.studentId} • ${s.classRoom}</p>
            <p class="text-sm primary-text font-medium mt-1">${p ? p.programName : ''}</p>
          </div>
        </div>
        ${p && p.targetJuzPerTerm > 0 ? `<div class="mb-4"><div class="flex justify-between text-sm mb-1"><span class="font-medium">ความคืบหน้าเทอมนี้</span><span>${r.completedJuz}/${p.targetJuzPerTerm} ยุซ (${progress}%)</span></div><div class="w-full bg-gray-200 rounded-full h-3"><div class="primary-bg h-3 rounded-full transition-all" style="width: ${progress}%"></div></div></div>` : '<p class="text-sm text-gray-500">โปรแกรมนี้ไม่มีเกณฑ์การประเมิน</p>'}
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-4">
          <div class="bg-blue-50 p-3 rounded-lg text-center"><p class="text-2xl font-bold text-blue-600">${r.totalLogs}</p><p class="text-xs text-gray-600">บันทึกทั้งหมด</p></div>
          <div class="bg-green-50 p-3 rounded-lg text-center"><p class="text-2xl font-bold text-green-600">${r.passCount}</p><p class="text-xs text-gray-600">ผ่าน</p></div>
          <div class="bg-yellow-50 p-3 rounded-lg text-center"><p class="text-2xl font-bold text-yellow-600">${r.reviewCount}</p><p class="text-xs text-gray-600">ต้องทบทวน</p></div>
          <div class="bg-purple-50 p-3 rounded-lg text-center"><p class="text-2xl font-bold text-purple-600">${r.avgScore}</p><p class="text-xs text-gray-600">คะแนนเฉลี่ย</p></div>
        </div>
      </div>
      
      ${notesHtml}

      <div class="bg-white rounded-xl shadow p-6 mb-6">
        <h3 class="font-bold text-gray-800 mb-4">🗺️ แผนที่ยุซ (30 ช่อง)</h3>
        <div class="grid grid-cols-6 md:grid-cols-10 gap-2 mb-4">${juzCells.join('')}</div>
      </div>
      
      <div class="bg-white rounded-xl shadow mb-6">
        <div class="p-5 border-b flex justify-between items-center">
          <h3 class="font-bold text-gray-800">📝 ประวัติการท่อง (ล่าสุด 20 รายการ)</h3>
          ${currentUser.role !== 'parent' ? `<button onclick="printStudentReport('${s.studentId}')" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm font-medium shadow-sm">🖨️ พิมพ์รายงาน</button>` : ''}
        </div>
        <div class="divide-y">${r.recentLogs.length === 0 ? '<p class="p-8 text-center text-gray-500">ยังไม่มีบันทึก</p>' : r.recentLogs.slice(0, 20).map(log => { const info = getLogTypeInfo(log.logType); return `<div class="p-4 flex items-center justify-between hover:bg-gray-50"><div class="flex-1"><div class="flex items-center gap-2 mb-1"><span class="px-2 py-0.5 rounded text-xs ${info.color}">${info.label}</span>${log.status === 'PASS' ? '<span class="text-green-600 text-xs font-medium">✓ ผ่าน</span>' : ''}</div><p class="text-sm text-gray-700">${log.surahName && log.surahName !== '-' ? `ยุซ ${log.juzNumber} - ${log.surahName}` : ''}${log.ayah && log.ayah !== '-' ? ` • อายะฮ์ ${log.ayah}` : ''}</p>${log.note ? `<p class="text-xs text-gray-500 italic mt-1">"${log.note}"</p>` : ''}</div><div class="text-right">${log.score > 0 ? `<p class="font-bold">⭐ ${log.score}/5</p>` : ''}<p class="text-xs text-gray-500">${formatDate(log.date)}</p></div></div>`; }).join('')}</div>
      </div>

      <div class="bg-white rounded-xl shadow p-6 mb-6">
        <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2"><span class="text-xl">📊</span> สรุปผลการประเมินรายเดือน (เทอม ${currentTermNum})</h3>
        <div class="grid grid-cols-1 gap-4">
          ${currentTermNum === 1 ? renderTermTable(1, term1MonthsThai, 5) : renderTermTable(2, term2MonthsThai, 11)}
        </div>
      </div>
    `;
    document.getElementById('mainContent').innerHTML = html;
  } catch (error) {
    hideLoading();
    showToast(error.message, 'error');
  }
}

// ============================================
// 👶 My Children (Parent View)
// ============================================
function renderMyChildren() {
  const content = document.getElementById('mainContent');
  const cacheKey = `mychildren_${currentUser.userId}`;

  const cachedChildren = cacheGet(cacheKey);
  const cachedPrograms = cacheGet('programs');

  // ⚡ มี cache ครบ → แสดงทันที + refresh background
  if (cachedChildren && cachedPrograms) {
    allStudents = cachedChildren.students;
    allPrograms = cachedPrograms.programs;
    displayStudents();
    refreshMyChildrenData(cacheKey, true);
    return;
  }

  // ไม่มี cache → ใช้ progress loader
  const loader = showProgressLoader({ estimatedSeconds: 6 });
  refreshMyChildrenData(cacheKey, false, loader);
}

// ============================================
// 👶 โหลดข้อมูลลูกของฉัน (Parent View) - Supabase
// ============================================
async function refreshMyChildrenData(cacheKey, silent, loader) {
  try {
    // 1. วิ่งไปดึงข้อมูลลูกจาก Supabase โดยกรองจาก parentId
    const { data: students, error: err1 } = await supabaseClient
      .from('Students')
      .select('*')
      .eq('parentId', currentUser.userId)
      .eq('isActive', true);

    if (err1) throw err1;

    allStudents = students || [];
    cacheSet(cacheKey, { success: true, students: allStudents });

    // 2. โหลดข้อมูลโปรแกรมการเรียน (เช็ค Cache ก่อน)
    const cachedP = cacheGet('programs');
    if (cachedP && cachedP.programs) {
      allPrograms = cachedP.programs;
    } else {
      const { data: progs, error: err2 } = await supabaseClient
        .from('Programs')
        .select('*')
        .eq('isActive', true);
        
      if (err2) throw err2;
      allPrograms = progs || [];
      cacheSet('programs', { success: true, programs: allPrograms });
    }

    // 3. สั่งให้หน้าจอวาด UI ใหม่
    if (loader) {
      loader.finish();
      setTimeout(function() {
        if (currentTab === 'mychildren') displayStudents();
      }, 500);
    } else {
      if (!silent && currentTab === 'mychildren') displayStudents();
    }

  } catch (error) {
    if (loader) loader.fail('เกิดข้อผิดพลาด: ' + error.message);
    else if (!silent) showToast('เกิดข้อผิดพลาด: ' + error.message, 'error');
    console.error("Fetch My Children Error: ", error);
  }
}

function refreshMyChildrenData(cacheKey, silent) {
  google.script.run
    .withSuccessHandler(function(response) {
      if (!response || !response.success) {
        if (!silent) showToast(response ? response.message : 'โหลดล้มเหลว', 'error');
        return;
      }

      cacheSet(cacheKey, response);
      allStudents = response.students;

      // โหลด programs (ใช้ cache ถ้ามี)
      const cachedP = cacheGet('programs');
      if (cachedP) {
        allPrograms = cachedP.programs;
        if (currentTab === 'mychildren') displayStudents();
      } else {
        google.script.run
          .withSuccessHandler(function(progResp) {
            if (progResp && progResp.success) {
              cacheSet('programs', progResp);
              allPrograms = progResp.programs;
              if (currentTab === 'mychildren') displayStudents();
            }
          })
          .getAllPrograms();
      }
    })
    .withFailureHandler(function(error) {
      if (!silent) showToast('เกิดข้อผิดพลาด: ' + error, 'error');
    })
    .getStudentsByParent(currentUser.userId);
}

// 🆕 ตัวแปรเก็บประวัติการท่องที่ผ่านแล้วของเด็กที่กำลังเปิด Modal
let currentStudentPassedLogs = [];

// ============================================
// 📝 เปิดหน้าต่างบันทึก
// ============================================
async function showLogModal(studentId) {
  const student = allStudents.find(s => s.studentId === studentId);
  if (!student) return;
  
  // 🚨 แจ้งใน Console ทันทีที่เปิดฟอร์ม
  console.log(`\n=========================================`);
  console.log(`👦 กำลังเปิดฟอร์มบันทึกของ: ${student.firstName} ${student.lastName} (รหัส: ${student.studentId})`);
  
  showLoading('กำลังเตรียมข้อมูล...');
  try {
    // ดึงประวัติที่สอบผ่านทั้งหมดของเด็กคนนี้
    const { data: pastLogs } = await supabaseClient
      .from('Logs')
      .select('*')
      .eq('studentId', studentId)
      .eq('status', 'PASS')
      .order('date', {ascending: false});
      
    currentStudentPassedLogs = pastLogs || [];
    console.log(`📂 ประวัติที่เคยท่องผ่านทั้งหมด:`, currentStudentPassedLogs.length, `รายการ`);

    if (!mappingData || mappingData.length === 0) {
      const { data, error } = await supabaseClient.from('Mapping').select('*');
      if (error) throw error;
      mappingData = data || []; 
    }
    
    hideLoading();
    renderLogModal(student);
  } catch (err) {
    hideLoading();
    showToast('เกิดข้อผิดพลาด: ' + err.message, 'error');
  }
}

// ==========================================
// 🕒 ฟังก์ชันสร้าง UI ประวัติการท่องในหน้าฟอร์ม
// ==========================================
function generateStudentHistoryHTML() {
    // ใช้ข้อมูลที่โหลดมารอไว้แล้วตอนเปิด Modal
    const sLogs = currentStudentPassedLogs || [];

    // แยกหมวดหมู่ (เอาแค่ 5 รายการล่าสุดต่อหมวด)
    const sabaqLogs = sLogs.filter(l => l.logType === 'سبق').slice(0, 5);
    const sabqiLogs = sLogs.filter(l => l.logType === 'سبقي').slice(0, 5);
    const manzilLogs = sLogs.filter(l => l.logType === 'منزل').slice(0, 5);
    const nazirahLogs = sLogs.filter(l => l.logType === 'نزيرة').slice(0, 5);
    const qiraatiLogs = sLogs.filter(l => l.logType === 'قراءتي').slice(0, 5);

    const renderList = (logs, title, icon, colorText, bgColor) => {
        if(logs.length === 0) return '';
        return `
        <div class="mb-3">
            <p class="text-[11px] font-bold ${colorText} mb-1 flex items-center gap-1 bg-${bgColor}-50 p-1 rounded">
                <span>${icon}</span> ${title}
            </p>
            <div class="space-y-1 pl-1">
                ${logs.map(l => `
                    <div class="flex justify-between items-center border-b border-gray-100 pb-1 last:border-0">

                ประวัติล่าสุด (เฉพาะที่ผ่าน)
